<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tu acceso a Flux fue aprobado</title>
</head>
<body style="margin:0;padding:0;background-color:#F2F2F7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#F2F2F7;">
    <tr>
      <td align="center" style="padding:48px 20px 60px;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:520px;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center">
                    <div style="width:64px;height:64px;background:#007AFF;border-radius:16px;display:inline-block;text-align:center;line-height:64px;box-shadow:0 8px 24px rgba(0,122,255,0.28);">
                      <img src="https://raw.githubusercontent.com/nevura/flux-app/main/flux-web/public/icon-192.png" width="40" height="40" alt="Flux" style="vertical-align:middle;border-radius:6px;" />
                    </div>
                    <p style="margin:12px 0 2px;font-size:22px;font-weight:700;color:#1C1C1E;letter-spacing:-0.5px;">Flux</p>
                    <p style="margin:0;font-size:13px;color:#8E8E93;">Finanzas que fluyen</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background:#FFFFFF;border-radius:20px;padding:40px 32px 36px;box-shadow:0 2px 16px rgba(0,0,0,0.08);">

              <!-- Checkmark icon -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="padding-bottom:24px;">
                    <div style="width:64px;height:64px;background:#E8FAF0;border-radius:50%;display:inline-block;text-align:center;line-height:64px;font-size:28px;">
                      ✅
                    </div>
                  </td>
                </tr>
              </table>

              <!-- Heading -->
              <p style="margin:0 0 10px;font-size:24px;font-weight:700;color:#1C1C1E;text-align:center;letter-spacing:-0.5px;">
                ¡Acceso aprobado!
              </p>
              <p style="margin:0 0 32px;font-size:15px;color:#6D6D72;text-align:center;line-height:1.65;">
                Ya puedes entrar a Flux y empezar a tener el control total de tus finanzas.
              </p>

              <!-- CTA -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:28px;">
                <tr>
                  <td align="center">
                    <a href="{{LOGIN_URL}}"
                       style="display:inline-block;background:#007AFF;color:#ffffff;text-decoration:none;font-size:16px;font-weight:600;padding:16px 48px;border-radius:14px;letter-spacing:-0.2px;box-shadow:0 6px 20px rgba(0,122,255,0.32);">
                      Entrar a Flux →
                    </a>
                  </td>
                </tr>
              </table>

              <!-- Divider + note -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="border-top:1px solid #F2F2F7;padding-top:20px;">
                    <p style="margin:0;font-size:12px;color:#AEAEB2;text-align:center;">
                      Si el botón no funciona, copia y pega esta URL en tu navegador:<br/>
                      <span style="color:#007AFF;">fluxapp-nevura.vercel.app</span>
                    </p>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:28px;">
              <p style="margin:0;font-size:11px;color:#AEAEB2;">
                Powered by <strong style="color:#8E8E93;">Nevura</strong>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
