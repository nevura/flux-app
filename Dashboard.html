                                        {activeAccounts.map(acc => {
                                            const real = inputs[acc.id_cuenta] ?? (summary.cuentas[acc.nombre] || 0);
                                            const reg = summary.cuentas[acc.nombre] || 0;
                                            const d = real - reg;
                                            if (Math.abs(d) < 0.01) return null;
                                            return (
                                                <div key={`summary-${acc.id_cuenta}`} className="flex justify-between items-center p-5 border-b border-slate-800/50 last:border-0 hover:bg-slate-800/50 transition-colors">
                                                    <div>
                                                        <p className="font-bold text-white text-sm">{acc.nombre}</p>
                                                        <p className="text-[10px] text-slate-500 uppercase font-black tracking-widest">Ajuste de <Price amount={Math.abs(d)} /></p>
                                                    </div>
                                                    <div className={`text-sm font-black ${d > 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                                        {d > 0 ? <i className="fa-solid fa-arrow-trend-up mr-2"></i> : <i className="fa-solid fa-arrow-trend-down mr-2"></i>}
                                                        {d > 0 ? 'Excedente' : 'Faltante'}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {activeAccounts.every(acc => Math.abs((inputs[acc.id_cuenta] ?? (summary.cuentas[acc.nombre] || 0)) - (summary.cuentas[acc.nombre] || 0)) < 0.01) && (
                                            <div className="p-10 text-center">
                                                <div className="w-16 h-16 bg-emerald-500/10 text-emerald-500 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">
                                                    <i className="fa-solid fa-circle-check"></i>
                                                </div>
                                                <p className="text-slate-300 font-bold">¡Todo en orden!</p>
                                                <p className="text-xs text-slate-500 mt-1">No se detectaron diferencias en las cuentas ajustadas.</p>
                                            </div>
                                        )}
                                    </div>

                                    <div className="flex gap-4">
                                        <button onClick={handleBack} className="flex-1 py-5 rounded-[24px] bg-slate-800 text-slate-400 font-black uppercase tracking-widest text-xs active:scale-95 transition-all">Revisar</button>
                                        <button
                                            onClick={() => {
                                                const finalAdjustments = activeAccounts
                                                    .map(acc => ({
                                                        id_cuenta: acc.id_cuenta,
                                                        cuentaNombre: acc.nombre,
                                                        cantidad: Number(((inputs[acc.id_cuenta] ?? (summary.cuentas[acc.nombre] || 0)) - (summary.cuentas[acc.nombre] || 0)).toFixed(2))
                                                    }))
                                                    .filter(adj => Math.abs(adj.cantidad) > 0.005);
                                                onApply(finalAdjustments);
                                                onClose();
                                            }}
                                            className="flex-[2] py-5 rounded-[24px] bg-emerald-600 text-white font-black uppercase tracking-widest text-xs shadow-xl shadow-emerald-900/40 active:scale-95 transition-all"
                                        >
                                            Aplicar y Guardar
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };
        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [loading, setLoading] = useState(true);
            const [isFadingLoader, setIsFadingLoader] = useState(false);
            const [saving, setSaving] = useState(false);
            const [isRefreshing, setIsRefreshing] = useState(false);
            const [headerOpacity, setHeaderOpacity] = useState(0);
            const [transactions, setTransactions] = useState([]);
            const [rawDB, setRawDB] = useState({});
            const accountMap = useMemo(() => {
                const map = {};
                if (rawDB.cuentas) rawDB.cuentas.forEach(c => map[c.id_cuenta] = c.nombre);
                map['CTA-CASH'] = "Efectivo";
                return map;
            }, [rawDB]);
            const [filterMonth, setFilterMonth] = useState(new Date().getMonth() + 1);
            const [filterYear, setFilterYear] = useState(new Date().getFullYear());
            const [presupuesto, setPresupuesto] = useState(0);
            const [isEditingBudget, setIsEditingBudget] = useState(false);
            const [tempBudget, setTempBudget] = useState("");
            const [dayDate, setDayDate] = useState(new Date());
            const [weekDate, setWeekDate] = useState(new Date());
            const [expandedAccount, setExpandedAccount] = useState(null);
            const [showPendingOnly, setShowPendingOnly] = useState(false);
            const [showDebtOnly, setShowDebtOnly] = useState(false);
            const [monthTransitionDir, setMonthTransitionDir] = useState(null);
            const [isBouncingMonth, setIsBouncingMonth] = useState(false);
            // NEW FILTER STATES
            const [searchQuery, setSearchQuery] = useState("");
            const [filterAccount, setFilterAccount] = useState("all");
            const [filterCategory, setFilterCategory] = useState("all");
            const [filterDebtor, setFilterDebtor] = useState("all");

            const [abonoModalOpen, setAbonoModalOpen] = useState(false);
            const [abonoData, setAbonoData] = useState(null);
            const [personDebtModalOpen, setPersonDebtModalOpen] = useState(false);
            const [selectedPersonDebt, setSelectedPersonDebt] = useState(null);
            const [configModalOpen, setConfigModalOpen] = useState(false);
            const [confirmModalOpen, setConfirmModalOpen] = useState(false);
            const [transactionModalOpen, setTransactionModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const [selectedTransaction, setSelectedTransaction] = useState(null);
            const [transactionToDelete, setTransactionToDelete] = useState(null);
            const [accountActionModalOpen, setAccountActionModalOpen] = useState(false);
            const [selectedAccountForAction, setSelectedAccountForAction] = useState(null);
            const [initialAdjustAccount, setInitialAdjustAccount] = useState(null);
            const [defaultBudgetModalOpen, setDefaultBudgetModalOpen] = useState(false);
            const [adjustModalOpen, setAdjustModalOpen] = useState(false);
            const [editingType, setEditingType] = useState('cat');
            const [configTab, setConfigTab] = useState('planificados');
            const [itemToDelete, setItemToDelete] = useState(null);
            const [defaultBudget, setDefaultBudget] = useState(7000);
            const scrollContainerRef = useRef(null);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const [fluxaAlert, setFluxaAlert] = useState({ open: false, title: '', message: '', onConfirm: () => { } });
            const [fluxaToast, setFluxaToast] = useState({ open: false, message: '', icon: 'fa-circle-check' });
            const [isEditingPlan, setIsEditingPlan] = useState(false);
            const [modalPreset, setModalPreset] = useState(null);
            const tabJustChanged = useRef(false);
            const [visibleCount, setVisibleCount] = useState(20);

            const openQuickTransaction = (type = 'TR-GASTO', accountId = null, category = null) => {
                setSelectedTransaction(null);
                setModalPreset({ type, accountId, category });
                setTransactionModalOpen(true);
            };

            useEffect(() => { loadData(); }, []);
            useEffect(() => {
                const container = scrollContainerRef.current;
                if (container) {
                    tabJustChanged.current = true;
                    container.style.scrollBehavior = 'auto';
                    container.scrollTop = 0;
                    setVisibleCount(20);
                    requestAnimationFrame(() => {
                        container.scrollTop = 0;
                        container.style.scrollBehavior = '';
                        tabJustChanged.current = false;
                    });
                }
            }, [activeTab]);

            useEffect(() => {
                setVisibleCount(20);
                const container = scrollContainerRef.current;
                if (container && (activeTab === 'moves' || activeTab === 'stats')) {
                    // Wait for DOM to fully re-render with reset visibleCount,
                    // then smooth scroll from the browser-clamped position to top
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            container.scrollTo({ top: 0, behavior: 'smooth' });
                        });
                    });
                }
            }, [filterMonth, filterYear]);
            useEffect(() => {
                if (rawDB.presupuestos) {
                    const budgetRecord = rawDB.presupuestos.find(p => parseInt(p.mes) === parseInt(filterMonth) && parseInt(p.año) === parseInt(filterYear));
                    const defRecord = rawDB.presupuestos.find(p => parseInt(p.mes) === 0 && parseInt(p.año) === 0);
                    const defVal = defRecord ? parseNumber(defRecord.monto) : 7000;
                    setDefaultBudget(defVal);
                    setPresupuesto(budgetRecord ? parseNumber(budgetRecord.monto) : defVal);
                }
            }, [filterMonth, filterYear, rawDB]);

            // --- CONFIGURACIÓN REACTIVA (MEJORA CRÍTICA: USEMEMO) ---
            // Esto asegura que si rawDB cambia (al editar categoría), el mapa se regenera instantáneamente
            const richConfig = useMemo(() => {
                const configMap = {};
                if (!rawDB.categorias) return configMap;

                [...DEFAULT_CATEGORIES, ...(rawDB.categorias || [])].forEach(cat => {
                    const iconObj = STATIC_ICONS.find(i => i.id_icon === cat.id_icon);
                    const colorObj = STATIC_COLORS.find(c => c.id_color === cat.id_color);
                    configMap[cat.id_categoria] = {
                        ...cat,
                        iconClass: iconObj ? iconObj.icon_base : 'fa-solid fa-tag',
                        tailwind: colorObj ? colorObj.tailwind : 'text-slate-400',
                        bg: colorObj ? colorObj.bg : 'bg-slate-800',
                        hex: colorObj ? colorObj.hex : '#94a3b8'
                    };
                });
                configMap['CAT-TRANSFER'] = { nombre: 'Transferencia', iconClass: 'fa-solid fa-money-bill-transfer', tailwind: 'text-blue-500', bg: 'bg-blue-500/20', hex: '#3b82f6' };
                configMap['CAT-APPLE'] = { id_categoria: 'CAT-APPLE', nombre: 'Apple Pay', iconClass: 'fa-brands fa-apple', tailwind: 'text-white', bg: 'bg-black', hex: '#ffffff' };

                // Inyectamos esto de vuelta a rawDB para que los modales lo usen, pero sin causar loops
                rawDB.categoriasConfig = configMap;
                return configMap;
            }, [rawDB]); // Dependencia: rawDB

            const loadData = (silent = false) => {
                if (!silent) setLoading(true);
                setIsRefreshing(true);
                if (typeof google !== 'undefined' && google.script) {
                    google.script.run.withSuccessHandler((data) => { processFluxaData(data); setIsRefreshing(false); }).withFailureHandler(() => setIsRefreshing(false)).getDashboardData();
                } else {
                    if (!silent) setTimeout(() => setLoading(false), 500);
                    setIsRefreshing(false);
                }
            };

            // Helper: refresca datos MANTENIENDO el spinner de "guardando" visible hasta que llegue la data fresca
            const refreshAfterWrite = (toastMsg) => {
                if (typeof google !== 'undefined' && google.script) {
                    google.script.run
                        .withSuccessHandler((data) => {
                            processFluxaData(data);
                            setSaving(false);
                            if (toastMsg) setFluxaToast({ open: true, message: toastMsg, icon: "fa-circle-check" });
                        })
                        .withFailureHandler(() => {
                            setSaving(false);
                            setFluxaToast({ open: true, message: "Error al actualizar", icon: "fa-circle-xmark" });
                        })
                        .getDashboardData();
                } else {
                    setSaving(false);
                }
            };

            const parseNumber = (val) => { if (!val) return 0; return parseFloat(String(val).replace(/,/g, '')) || 0; };

            const processFluxaData = (jsonString) => {
                const db = JSON.parse(jsonString);
                db.icons = STATIC_ICONS;
                db.colores = STATIC_COLORS;
                db.metodo_pago = STATIC_PAYMENT_METHODS;
                db.planificados = (db.planificados || []).map(p => {
                    let split = p.split_data;
                    if (typeof split === 'string' && split.includes('java.lang.Object')) {
                        split = "";
                    }
                    return { ...p, split_data: split };
                });

                // const accMap = {};
                // if (db.cuentas) db.cuentas.forEach(c => accMap[c.id_cuenta] = c.nombre);
                // accMap['CTA-CASH'] = "Efectivo";
                // setAccountMap(accMap);

                const rawMoves = db.movimientos.map(m => {
                    let tipo = parseNumber(m.ajuste) > 0 ? 'Ingreso' : 'Gasto';
                    if (m.id_categoria === 'CAT-TRANSFER') tipo = 'Transferencia';
                    else if (m.id_transaccion === 'TR-INGRESO') tipo = 'Ingreso';
                    else if (m.id_transaccion === 'TR-GASTO') tipo = 'Gasto';

                    // LÓGICA DE DATOS DUROS: Extraemos los dígitos directamente del texto
                    // Ejemplo: "2026-01-01T03:14:48Z" -> ["2026-01-01"]
                    const datePart = String(m.created_time).split('T')[0];
                    const [y, mm, d] = datePart.split('-').map(Number);

                    return {
                        id: m.id_movimiento,
                        nombre: m.concepto,
                        tipo_transaccion: tipo,
                        ajuste: parseNumber(m.ajuste),
                        categoria: m.id_categoria,
                        cuenta: m.id_cuenta,
                        fecha: m.created_time, // Guardamos el string original
                        mes: mm,               // Hard data: Enero siempre será 1
                        anio: y,               // Hard data: 2026 siempre será 2026
                        dia: d,
                        validado: (m.validado === undefined || m.validado === "" || m.validado == 1),
                        id_planificado: m.id_planificado,
                        split_data: m.split_data,
                        excluir_presupuesto: (m.excluir_presupuesto == 1),
                        es_por_cobrar: (m.es_por_cobrar == 1),
                        es_por_pagar: (m.es_por_pagar == 1)
                    };
                });

                setTransactions(processTransferPairs(rawMoves));
                setRawDB(db);

                // Inicio de transición premium
                setIsFadingLoader(true);
                setTimeout(() => {
                    setLoading(false);
                    document.body.classList.add('loaded');
                }, 300); // 300ms en lugar de 800ms para carga más rápida
            };

            const processTransferPairs = (sortedData) => {
                const sorted = [...sortedData].sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
                const processed = []; const skipIds = new Set();
                for (let i = 0; i < sorted.length; i++) {
                    const current = sorted[i]; if (skipIds.has(current.id)) continue;
                    if (current.tipo_transaccion === 'Transferencia') {
                        const pairIndex = sorted.findIndex((t, idx) => { if (idx <= i || skipIds.has(t.id) || t.tipo_transaccion !== 'Transferencia') return false; const amountMatch = Math.abs(t.ajuste) === Math.abs(current.ajuste); const signMatch = (t.ajuste * current.ajuste) < 0; const d1 = new Date(t.fecha).toDateString(); const d2 = new Date(current.fecha).toDateString(); return amountMatch && signMatch && d1 === d2; });
                        if (pairIndex !== -1) { const pair = sorted[pairIndex]; const originTx = current.ajuste < 0 ? current : pair; const destTx = current.ajuste > 0 ? current : pair; processed.push({ ...destTx, id: `merged-${originTx.id}`, nombre: "Transferencia", categoria: "CAT-TRANSFER", sourceAccount: originTx.cuenta, destAccount: destTx.cuenta, ajuste: Math.abs(destTx.ajuste), isTransferPair: true, fecha: current.fecha }); skipIds.add(pair.id); } else { processed.push(current); }
                    } else { processed.push(current); }
                }
                return processed;
            };

            const goToToday = () => {
                const now = new Date(); setFilterMonth(now.getMonth() + 1); setFilterYear(now.getFullYear());
            };

            const filteredData = useMemo(() => {
                let data = transactions;

                // 1. TEMPORAL / VIEW FILTERS
                if (showPendingOnly) {
                    data = data.filter(t => !t.validado);
                } else if (showDebtOnly) {
                    data = data.filter(t =>
                        (t.split_data && t.split_data.data && t.split_data.data.some(p => p.id !== 'PER-YO' && !p.paidStatus)) ||
                        t.es_por_cobrar ||
                        t.es_por_pagar
                    );
                } else {
                    // Standard History View
                    data = data.filter(t => t.mes === filterMonth && t.anio === filterYear);
                }

                // 2. SEARCH FILTER (Applied on top)
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    data = data.filter(t => t.nombre.toLowerCase().includes(q) || (richConfig[t.categoria]?.nombre || "").toLowerCase().includes(q));
                }

                // 3. SPECIFIC FILTERS (Apply on top of result)
                if (filterAccount !== 'all') {
                    data = data.filter(t => t.cuenta === filterAccount || t.sourceAccount === filterAccount || t.destAccount === filterAccount);
                }
                if (filterCategory !== 'all') {
                    data = data.filter(t => t.categoria === filterCategory);
                }
                if (showDebtOnly && filterDebtor !== 'all') {
                    data = data.filter(t =>
                        (t.split_data && t.split_data.data && t.split_data.data.some(p => p.id === filterDebtor && !p.paidStatus)) ||
                        (t.es_por_cobrar && t.split_data && t.split_data.data && t.split_data.data.some(p => p.id === filterDebtor)) ||
                        (t.es_por_pagar && t.split_data && t.split_data.data && t.split_data.data.some(p => p.id === filterDebtor))
                    );
                }

                return data;
            }, [transactions, filterMonth, filterYear, showPendingOnly, showDebtOnly, searchQuery, filterAccount, filterCategory, filterDebtor, richConfig]);

            const summary = useMemo(() => {
                let ingresos = 0, gastos = 0, saldoHistorico = 0, porCobrarTotal = 0, porPagarTotal = 0;
                let gastoFijoReal = 0, gastoVariableReal = 0;
                let planFijoTotal = 0, planVariableTotal = 0;

                const cuentas = {};
                const categoriasGasto = {};
                // Fin de mes seleccionado para limitar saldo histórico
                const endOfSelectedMonth = new Date(filterYear, filterMonth, 0, 23, 59, 59);

                // OPTIMIZACIÓN: Pre-agrupar transacciones del mes por id_planificado
                const movsPorPlan = {};
                transactions.forEach(t => {
                    if (t.mes === filterMonth && t.anio === filterYear && t.id_planificado) {
                        const pid = String(t.id_planificado).trim();
                        if (!movsPorPlan[pid]) movsPorPlan[pid] = [];
                        movsPorPlan[pid].push(t);
                    }
                });

                transactions.forEach(t => {
                    const tDate = new Date(t.fecha);
                    if (tDate <= endOfSelectedMonth) {
                        const affectsBalance = !t.es_por_pagar && !t.es_por_cobrar && (t.validado || t.tipo_transaccion === 'Gasto');
                        if (!t.isTransferPair && t.tipo_transaccion !== 'Transferencia' && affectsBalance) {
                            saldoHistorico += t.ajuste;
                        }
                    }
                    if (t.mes === filterMonth && t.anio === filterYear) {
                        if (t.tipo_transaccion === 'Ingreso') {
                            if (t.es_por_cobrar) porCobrarTotal += t.ajuste;
                            if (t.validado && !t.es_por_cobrar) ingresos += t.ajuste;
                        }
                        if (t.tipo_transaccion === 'Gasto') {
                            const m = Math.abs(t.ajuste);
                            if (t.es_por_pagar) porPagarTotal += m;
                            if (!t.excluir_presupuesto) {
                                gastos += m;
                                categoriasGasto[t.categoria] = (categoriasGasto[t.categoria] || 0) + m;
                            }
                        }
                    }

                    const affectsBalance = !t.es_por_pagar && !t.es_por_cobrar && (t.validado || t.tipo_transaccion === 'Gasto');
                    if (affectsBalance) {
                        if (t.isTransferPair) {
                            const o = accountMap[t.sourceAccount] || 'Desc.';
                            const d = accountMap[t.destAccount] || 'Desc.';
                            cuentas[o] = (cuentas[o] || 0) - (t.ajuste || 0);
                            cuentas[d] = (cuentas[d] || 0) + (t.ajuste || 0);
                        }
                        else {
                            const n = accountMap[t.cuenta] || 'Desc.';
                            cuentas[n] = (cuentas[n] || 0) + (t.ajuste || 0);
                        }
                    }
                });

                if (rawDB.planificados) {
                    rawDB.planificados.forEach(p => {
                        const rawEstado = String(p.estado).toUpperCase();
                        const isActivo = rawEstado === 'ACTIVO' || rawEstado === 'TRUE' || rawEstado === '1';
                        const pId = String(p.id_planificado).trim();

                        const dateParts = String(p.proximo_cobro).split('T')[0].split('-');
                        const pYear = parseInt(dateParts[0]);
                        const pMonth = parseInt(dateParts[1]);

                        const esMesDeCobro = (pMonth === filterMonth && pYear === filterYear);
                        const movsExistentes = movsPorPlan[pId] || [];

                        const shouldCountPlan = isActivo && esMesDeCobro;
                        const shouldCountReal = movsExistentes.length > 0;

                        if (shouldCountPlan || shouldCountReal) {
                            const planConfigurado = parseFloat(p.cantidad) || 0;
                            const montoReal = movsExistentes.reduce((sum, t) => sum + Math.abs(t.ajuste), 0);
                            const montoReferenciaUI = shouldCountPlan ? planConfigurado : (shouldCountReal ? montoReal : 0);

                            planVariableTotal += montoReferenciaUI;
                            gastoVariableReal += shouldCountReal ? montoReal : 0;
                        }
                    });
                }

                return { ingresos, gastos, porCobrarTotal, balanceTotal: saldoHistorico, cuentas, categoriasGasto, stats: { fijo: { real: gastoFijoReal, plan: planFijoTotal }, variable: { real: gastoVariableReal, plan: planVariableTotal } } };
            }, [transactions, filterMonth, filterYear, accountMap, rawDB.planificados]);

            // === LÓGICA DE INSIGHTS DEFINITIVA (FECHA DINÁMICA) ===
            const insights = useMemo(() => {
                if (!transactions || transactions.length === 0) {
                    return { historicalDailyBurn: 0, currentDailyBurn: 0, averageMonthlyExpense: 0, runway: 999, netFlow: 0, projectedSpend: 0, overburn: null };
                }

                // 1. DETERMINAR EL "DÍA HOY" DEL DATASET
                // Buscamos la fecha más reciente en tus transacciones.
                // Si tus datos son de Diciembre 2025, anchorDate será Diciembre 2025.
                const lastTransactionDate = new Date(Math.max(...transactions.map(t => new Date(t.fecha))));
                const realToday = new Date();

                // Si la última transacción es futura (vs realToday), usamos esa. Si es pasada, usamos realToday.
                // Esto permite que el burn rate funcione en simulaciones futuras O en uso real presente.
                const anchorDate = lastTransactionDate > realToday ? lastTransactionDate : realToday;

                // 2. VENTANA DE 30 DÍAS RELATIVA AL ANCHOR
                const thirtyDaysAgo = new Date(anchorDate);
                thirtyDaysAgo.setDate(anchorDate.getDate() - 30);
                thirtyDaysAgo.setHours(0, 0, 0, 0);

                const last30DaysExpenses = transactions.filter(t =>
                    t.validado &&
                    t.tipo_transaccion === 'Gasto' &&
                    !t.isTransferPair &&
                    new Date(t.fecha) >= thirtyDaysAgo &&
                    new Date(t.fecha) <= anchorDate // Acotar al anchor
                );

                const totalSpendLast30 = last30DaysExpenses.reduce((acc, t) => acc + Math.abs(t.ajuste), 0);

                // Burn Rate Diario Histórico (Basado en los últimos 30 días de actividad real)
                const fixedHistoricDailyBurn = totalSpendLast30 / 30;
                const fixedHistoricMonthlyBurn = fixedHistoricDailyBurn * 30.44;

                // 3. VELOCIDAD DEL MES SELECCIONADO (FILTRO)
                const daysInMonth = new Date(filterYear, filterMonth, 0).getDate();
                // Determinar si estamos viendo el "mes en curso" según el Anchor Date
                const isAnchorMonth = anchorDate.getMonth() + 1 === filterMonth && anchorDate.getFullYear() === filterYear;

                // Días transcurridos en el mes filtrado (para proyección)
                // Si es el mes del anchor, usamos el día del anchor. Si es pasado, mes completo.
                const daysPassedInMonth = isAnchorMonth ? anchorDate.getDate() : daysInMonth;

                let gastoParaBurnRateActual = summary.gastos;
                // Sumar variables pendientes solo si estamos en el mes activo
                if (summary.stats && summary.stats.variable) {
                    const totalPlanVar = summary.stats.variable.plan || 0;
                    const totalRealVar = summary.stats.variable.real || 0;
                    const variablesPendientes = Math.max(0, totalPlanVar - totalRealVar);
                    if (isAnchorMonth) gastoParaBurnRateActual += variablesPendientes;
                }

                const currentMonthBurnRate = daysPassedInMonth > 0 ? gastoParaBurnRateActual / daysPassedInMonth : 0;

                // 4. PROYECCIONES Y RUNWAY
                const incomeThisMonth = summary.ingresos;
                const remainingDays = Math.max(0, daysInMonth - daysPassedInMonth);
                const projectedSpend = isAnchorMonth ? gastoParaBurnRateActual + (currentMonthBurnRate * remainingDays) : summary.gastos;

                const currentTotalLiquidity = transactions.reduce((acc, t) => {
                    // MEJORA: Incluir gastos no validados para que la liquidez refleje pagos próximos
                    if (!t.isTransferPair && t.tipo_transaccion !== 'Transferencia' && (t.validado || t.tipo_transaccion === 'Gasto') && new Date(t.fecha) <= anchorDate) {
                        return acc + t.ajuste;
                    }
                    return acc;
                }, 0);

                const runway = fixedHistoricDailyBurn > 0 ? Math.floor(currentTotalLiquidity / fixedHistoricDailyBurn) : 999;

                let overburn = null;
                // YA NO RESTRINGIMOS A SOLO EL MES ACTUAL (isAnchorMonth)
                if (fixedHistoricMonthlyBurn > 0) {
                    overburn = (projectedSpend - fixedHistoricMonthlyBurn) / fixedHistoricMonthlyBurn;
                } else if (isAnchorMonth && presupuesto > 0) {
                    const percentTime = daysPassedInMonth / daysInMonth;
                    const percentSpend = gastoParaBurnRateActual / presupuesto;
                    overburn = percentSpend - percentTime;
                }

                return {
                    burnRate: fixedHistoricDailyBurn,
                    currentDailyBurn: currentMonthBurnRate,
                    averageMonthlyExpense: fixedHistoricMonthlyBurn,
                    projectedSpend: projectedSpend,
                    runway,
                    netFlow: incomeThisMonth - summary.gastos,
                    overburn,
                    historicalDailyBurn: fixedHistoricDailyBurn // Alias para compatibilidad visual
                };
            }, [transactions, filterMonth, filterYear, summary, presupuesto]); // Dependencias

            const topStats = useMemo(() => {

                const catTotals = {};

                const topCategories = Object.entries(catTotals).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([catId, val]) => ({ label: richConfig[catId] ? richConfig[catId].nombre : 'Otro', value: val, id: catId }));
                const monthTotals = {};
                transactions.forEach(t => { if (t.tipo_transaccion === 'Gasto' && !t.isTransferPair) { const d = new Date(t.fecha); const key = `${d.getFullYear()}-${d.getMonth()}`; monthTotals[key] = (monthTotals[key] || 0) + Math.abs(t.ajuste); } });
                const topMonths = Object.entries(monthTotals).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([key, val]) => { const [y, m] = key.split('-'); const dateObj = new Date(parseInt(y), parseInt(m)); return { label: dateObj.toLocaleString('es-MX', { month: 'short', year: '2-digit' }).toUpperCase(), value: val }; });
                return { topCategories, topMonths };
            }, [transactions, richConfig]);

                return Array.from(years).filter(n => !isNaN(n)).sort((a, b) => b - a);
            }, [transactions]);
            const totalPending = useMemo(() => transactions.filter(t => !t.validado).length, [transactions]);
            const hasDebts = useMemo(() => transactions.some(t => {
                const s = (t.split_data && typeof t.split_data === 'object') ? t.split_data : trySafeJSON(t.split_data, null, t.concepto);
                const hasSplitDebt = s && (s.data || s.assignments || []).some(p => p.id !== 'PER-YO' && !p.paidStatus);
                const hasSplitIOwe = s && (s.data || s.assignments || []).some(p => p.id === 'PER-YO' && !p.paidStatus);
                return hasSplitDebt || hasSplitIOwe || t.es_por_cobrar || t.es_por_pagar;
            }), [transactions]);

            const personBalances = useMemo(() => {
                const balances = {};
                if (!rawDB.personas) return balances;

                rawDB.personas.forEach(p => {
                    balances[p.id_persona] = { id: p.id_persona, nombre: p.nombre, net: 0, owesMe: 0, IOwe: 0, movements: [] };
                });

                transactions.forEach(t => {
                    const split = (t.split_data && typeof t.split_data === 'object' ? t.split_data : trySafeJSON(t.split_data, null, t.concepto));
                    if (!split || (!split.data && !split.assignments)) {
                        // Si es una deuda marcada por flag pero sin split_data detallado
                        if (t.es_por_pagar || t.es_por_cobrar) {
                            // TODO: Manejar casos sin split_data si fuera necesario, 
                            // pero por ahora dependemos de que exista split_data para saber quién es la contraparte.
                        }
                        return;
                    }

                    const splitData = split.data || split.assignments;
                    const splitMode = split.splitMode || "DIV";

                    // Identificamos quién pagó realmente.
                    // Si el modo es "IOWE" (Yo debo), el pagador es cualquiera que NO sea PER-YO.
                    const payer = (splitMode === 'IOWE')
                        ? (splitData.find(p => p.id !== 'PER-YO') || splitData[0])
                        : (splitData.find(p => p.id === 'PER-YO') || splitData[0]);

                    if (!payer) return;

                    // CASO ESPECIAL: Si es IOWE y PER-YO no está en el splitData, 
                    // significa que YO debo el total a quien pagó (el payer).
                    if (splitMode === 'IOWE' && !splitData.some(p => p.id === 'PER-YO')) {
                        const targetId = payer.id;
                        const targetName = payer.nombre || targetId;
                        if (!balances[targetId]) {
                            balances[targetId] = { id: targetId, nombre: targetName, net: 0, owesMe: 0, IOwe: 0, movements: [] };
                        }
                        const totalDebt = Math.abs(t.ajuste);
                        balances[targetId].movements.push({ id: t.id, nombre: t.nombre, fecha: t.fecha, isDebt: true, pendingAmt: totalDebt, transaction: t });
                        balances[targetId].IOwe += totalDebt;
                        balances[targetId].net -= totalDebt;
                        return;
                    }

                    // CASO ESPECIAL: Si es THEY y PER-YO no está en el splitData,
                    // significa que EL RESTO me debe a MÍ (el payer implícito).
                    if (splitMode === 'THEY' && !splitData.some(p => p.id === 'PER-YO')) {
                        const totalCredit = Math.abs(t.ajuste);
                        splitData.forEach(p => {
                            const targetId = p.id;
                            const targetName = p.nombre || targetId;
                            if (!balances[targetId]) {
                                balances[targetId] = { id: targetId, nombre: targetName, net: 0, owesMe: 0, IOwe: 0, movements: [] };
                            }
                            const val = parseFloat(p.value) || totalCredit;
                            balances[targetId].movements.push({ id: t.id, nombre: t.nombre, fecha: t.fecha, isDebt: false, pendingAmt: val, transaction: t });
                            balances[targetId].owesMe += val;
                            balances[targetId].net += val;
                        });
                        return;
                    }

                    splitData.forEach(p => {
                        const isYo = p.id === 'PER-YO';
                        const isPayer = p.id === payer.id;
                        const pending = (p.value - (p.paidAmount || 0));

                        // Lógica de skip para ya pagados (Estricta)
                        if (p.paidStatus) return;

                        // Monto final
                        const finalPending = pending;
                        if (finalPending <= 0.01) return;

                        let targetId, targetName, isDebtForMe;

                        if (isYo) {
                            // YO debo. El acreedor es el pagador.
                            if (isPayer) return;
                            targetId = payer.id;
                            targetName = payer.nombre || targetId;
                            isDebtForMe = true;
                        } else {
                            // OTRO debe. Solo nos interesa si el acreedor soy YO.
                            if (payer.id !== 'PER-YO') return;
                            targetId = p.id;
                            targetName = p.nombre || targetId;
                            isDebtForMe = false;
                        }

                        if (!balances[targetId]) {
                            balances[targetId] = { id: targetId, nombre: targetName, net: 0, owesMe: 0, IOwe: 0, movements: [] };
                        }

                        balances[targetId].movements.push({
                            id: t.id,
                            nombre: t.nombre,
                            fecha: t.fecha,
                            isDebt: isDebtForMe,
                            pendingAmt: finalPending,
                            transaction: t
                        });

                        if (isDebtForMe) {
                            balances[targetId].IOwe += finalPending;
                            balances[targetId].net -= finalPending;
                        } else {
                            balances[targetId].owesMe += finalPending;
                            balances[targetId].net += finalPending;
                        }
                    });
                });
                return balances;
            }, [transactions, rawDB.personas]);
            const fmt = (num) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num);
            const dailySpend = useMemo(() => {
                // "2026-01-01" obtenido del selector de la UI
                // FIX: Usar zona horaria local para evitar que 10pm se convierta en el día siguiente (UTC)
                // const dayStr = dayDate.toISOString().split('T')[0];
                const offset = dayDate.getTimezoneOffset() * 60000;
                const localDate = new Date(dayDate.getTime() - offset);
                const dayStr = localDate.toISOString().split('T')[0];

                return transactions.reduce((acc, t) => {
                    // "2026-01-01" obtenido del dato duro del registro
                    const tDateStr = t.fecha.split('T')[0];
                    return (t.tipo_transaccion === 'Gasto' && tDateStr === dayStr) ? acc + Math.abs(t.ajuste) : acc;
                }, 0);
            }, [transactions, dayDate]);;
            const getMonday = (d) => { const dt = new Date(d); const day = dt.getDay(); const diff = dt.getDate() - day + (day === 0 ? -6 : 1); const m = new Date(dt.setDate(diff)); m.setHours(0, 0, 0, 0); return m; };
            const isCurrentWeek = useMemo(() => getMonday(new Date()).getTime() === getMonday(weekDate).getTime(), [weekDate]);
            const weeklyStats = useMemo(() => {
                const m = getMonday(weekDate);
                const nm = new Date(m); nm.setDate(m.getDate() + 7);

                const total = transactions.reduce((acc, t) => {
                    const td = new Date(t.fecha); // Aquí usamos UTC para comparar rangos
                    const tTime = Date.UTC(td.getUTCFullYear(), td.getUTCMonth(), td.getUTCDate());
                    const startTime = Date.UTC(m.getFullYear(), m.getMonth(), m.getDate());
                    const endTime = Date.UTC(nm.getFullYear(), nm.getMonth(), nm.getDate());

                    return (t.tipo_transaccion === 'Gasto' && tTime >= startTime && tTime < endTime) ? acc + Math.abs(t.ajuste) : acc;
                }, 0);

                const ew = new Date(nm); ew.setDate(ew.getDate() - 1);
                return { total, rangeStr: `${m.getDate()} - ${ew.getDate()} ${ew.toLocaleString('es-MX', { month: 'short' }).toUpperCase()}` };
            }, [transactions, weekDate]);

            useEffect(() => {
                let timer;
                if (activeTab === 'stats' && !loading) {

                    }
                    const top = Object.entries(summary.categoriasGasto).sort((a, b) => b[1] - a[1]);

                    if (top.length > 0 && chartRef.current) {
                        timer = setTimeout(() => {
                            if (!chartRef.current) return;
                            const ctx = chartRef.current.getContext('2d');
                            chartInstance.current = new Chart(ctx, {

                                data: {

                                        borderWidth: 0,

                                    layout: { padding: 20 }

                        }, 150);

            if (loading) return <FancyLoader />;
            const diferencia = presupuesto - summary.gastos; const porcentaje = Math.min((summary.gastos / presupuesto) * 100, 100); const esExcedido = diferencia < 0; const showTotalHeader = activeTab !== 'home' || headerOpacity > 0.1;

                                        </div>
                                    </div>
                                    <div className={`rounded-3xl p-7 border transition-all duration-300 mt-5 ${esExcedido ? 'border-rose-500 bg-rose-500/10' : 'border-emerald-500 bg-emerald-500/10'}`}>
                                        <div className="flex justify-between items-center mb-3">
                                            <div className="flex items-center gap-2">

                                                    </button>

                                            </div>
                                            <button onClick={isEditingBudget ? saveBudgetEdit : startEditing} className={`${isEditingBudget ? 'text-emerald-400 bg-emerald-500/20' : 'text-slate-500 hover:text-white'} transition-colors p-2 rounded-full`}>{isEditingBudget ? <Check size={18} /> : <Pencil size={16} />}</button>
                                        </div>
                                        <div className="flex items-end gap-2 mb-3 h-9">{isEditingBudget ? (<input type="number" inputMode="decimal" value={tempBudget} onChange={e => setTempBudget(e.target.value.replace(/^0+/, ''))} className="w-full bg-transparent border-b-2 border-blue-500 text-3xl font-black text-white outline-none placeholder-slate-600" autoFocus placeholder="0" />) : (<> <span className="text-3xl font-black text-white"><Price amount={summary.gastos} /></span> <span className="text-sm text-slate-500 font-bold mb-1 opacity-70">/ {fmt(presupuesto)}</span> </>)}</div>
                                        <AnimatedBudgetBar percent={porcentaje} isExceeded={esExcedido} /><p className={`text-s font-bold text-right mt-2 ${esExcedido ? 'text-rose-400' : 'text-emerald-400'}`}>{esExcedido ? 'Excedido' : 'Disponible'}: <Price amount={Math.abs(diferencia)} /></p>
                                    </div>
                                </div>
                            )}
                            {activeTab === 'home' && (
                                <>
                                    <div className="snap-section animate-enter">
                                        <h3 className="text-slate-400 text-xs font-bold uppercase tracking-wider px-2 sticky-sub-header">Tu Actividad</h3>
                                        <div className="section-content flex flex-col gap-4">
                                            <SwipeCard title="Gasto Diario" color="text-blue-400" btnColorClass="text-blue-400 bg-blue-500/20" value={dailySpend} dateMain={`${dayDate.getDate()} ${dayDate.toLocaleString('es-MX', { month: 'short' }).toUpperCase().replace('.', '')}`} dateSub={dayDate.toLocaleDateString('es-MX', { weekday: 'long' })} onSwipeLeft={() => setDayDate(d => { const n = new Date(d); n.setDate(d.getDate() + 1); return n; })} onSwipeRight={() => setDayDate(d => { const n = new Date(d); n.setDate(d.getDate() - 1); return n; })} showReset={dayDate.toDateString() !== new Date().toDateString()} onReset={() => setDayDate(new Date())} uniqueKey={dayDate.getTime()} />
                                            <SwipeCard title="Gasto Semanal" color="text-purple-400" btnColorClass="text-purple-400 bg-purple-500/20" value={weeklyStats.total} dateMain={weeklyStats.rangeStr} dateSub="Semana Actual" onSwipeLeft={() => setWeekDate(d => { const n = new Date(d); n.setDate(d.getDate() + 7); return n; })} onSwipeRight={() => setWeekDate(d => { const n = new Date(d); n.setDate(d.getDate() - 7); return n; })} showReset={!isCurrentWeek} onReset={() => setWeekDate(new Date())} uniqueKey={weekDate.getTime()} />
                                        </div>
                                    </div>
                                    <div className="snap-section animate-enter">
                                        <div className="flex justify-between items-center px-1 sticky-sub-header pr-2">
                                            <h3 className="text-slate-400 text-xs font-bold uppercase tracking-widest">Estado de Cuentas</h3>
                                            <button
                                                onClick={() => checkBudgetGuard(() => { setInitialAdjustAccount(null); setAdjustModalOpen(true); })}

                                            >
                                                <i className="fa-solid fa-magnifying-glass-dollar fa-lg text-blue-500"></i>
                                                Ajustar
                                            </button>
                                        </div>
                                        <div className="section-content grid grid-cols-2 gap-4 pb-20">
                                            {rawDB.cuentas && rawDB.cuentas.map((cta) => { const s = summary.cuentas[cta.nombre] || 0; const isZero = Math.abs(s) < 0.005; const metodoInfo = rawDB.metodo_pago ? rawDB.metodo_pago.find(m => m.id_metodo_pago === cta.id_metodo_pago) : null; const colorInfo = metodoInfo && rawDB.colores ? rawDB.colores.find(col => col.id_color === metodoInfo.id_color) : null; const iconColorClass = colorInfo ? colorInfo.tailwind : 'text-slate-500'; return (<div key={cta.id_cuenta} onClick={() => checkBudgetGuard(() => { setSelectedAccountForAction(cta); setAccountActionModalOpen(true); })} className="bg-slate-900 p-5 rounded-[24px] border border-slate-800 flex flex-col justify-between min-h-[9rem] shadow-sm hover:bg-slate-800/80 transition-colors cursor-pointer relative active:scale-95 duration-200"><div className="flex justify-between items-start mb-2"><span className={`text-slate-300 text-lg font-bold capitalize w-full leading-tight line-clamp-3`}>{cta.nombre}</span></div><div className={`text-xl font-black truncate ${isZero ? 'text-slate-600' : s > 0.005 ? 'text-emerald-400' : 'text-rose-400'}`}><Price amount={s} /></div>{metodoInfo && (<div className={`absolute bottom-3 right-4 text-xl ${iconColorClass}`}><i className={metodoInfo.icon}></i></div>)}</div>) })}

                            {activeTab === 'insights' && (
                                <div className="tab-content-section animate-enter">

                                    </div>

                            {activeTab === 'settings' && (
                                <div className="tab-content-section animate-enter">
                                    <div className="sticky-sub-header py-1">
                                        <div className="bg-slate-900/80 p-1 rounded-2xl flex border border-slate-800 shadow-xl overflow-x-auto no-scrollbar gap-0.5">

                                                        <div className="absolute left-4 top-2.5 text-slate-500">

                                                            className="w-full bg-slate-900 border border-slate-800 rounded-2xl pl-11 pr-10 py-2 text-[16px] font-bold text-white outline-none focus:border-blue-500 focus:bg-slate-800/80 transition-all placeholder:text-slate-600"

                                                                <i className="fa-solid fa-xmark"></i>
                                                            </button>

                                                    <i className="fa-solid fa-filter-circle-xmark text-lg"></i>

                                                    >
                                                        <option value="all">Cuenta: Todas</option>
                                                        {rawDB.cuentas && rawDB.cuentas.map(c => <option key={c.id_cuenta} value={c.id_cuenta}>{c.nombre}</option>)}

                                                                    <div className="mb-4 bg-slate-900/50 rounded-xl p-3 border border-slate-700/30">

                                                                                <button
                                                                                    key={`${mov.id}-${idx}`}

                                                                                        setAbonoData(mov.transaction);

                                                                                    </div>
                                                                                </button>

                                                                        </div>
                                                                    </div>

                                                                    {isPositive && Math.abs(net) > 0.01 && (

                                                                            onClick={() => {

                                                                            }}
