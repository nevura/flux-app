                                                                        >
                                                                            <i className="fa-solid fa-hand-holding-dollar text-xs"></i>
                                                                            Cobrar Todo
                                                                        </button>
                                                                    )}
                                                                    {!isPositive && Math.abs(net) > 0.01 && (
                                                                        <button
                                                                            onClick={() => {
                                                                                setSelectedPersonDebt({ ...p, type: 'debt', totalPending: Math.abs(net) });
                                                                                setPersonDebtModalOpen(true);
                                                                            }}
                                                                            className="flex-1 py-2.5 bg-rose-500/10 border border-rose-500/20 rounded-xl text-rose-400 text-[10px] font-black uppercase tracking-[0.1em] flex items-center justify-center gap-1.5 hover:bg-rose-500/20 transition-colors"
                                                                        >
                                                                            <i className="fa-solid fa-circle-dollar-to-slot text-xs"></i>
                                                                            Pagar
                                                                        </button>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        );
                                                    })
                                                }
                                                {Object.values(personBalances).filter(p => p.owesMe > 0.01 || p.IOwe > 0.01).filter(p => filterDebtor === 'all' || p.id === filterDebtor).length === 0 && (
                                                    <div className="flex flex-col items-center justify-center py-20 opacity-50">
                                                        <i className="fa-solid fa-handshake text-4xl mb-3"></i>
                                                        <p className="text-sm font-bold">Sin deudas pendientes</p>
                                                    </div>
                                                )}
                                            </div>
                                        ) : (
                                            <>
                                                {filteredData.length === 0 && (<div className="flex flex-col items-center justify-center py-20 opacity-50"><i className="fa-solid fa-clipboard-check text-4xl mb-3"></i><p className="text-sm font-bold">Todo al día</p></div>)}
                                                {filteredData.slice(0, visibleCount).map((t, idx) => {
                                                    const meta = richConfig[t.categoria] || { nombre: 'Otro', iconClass: 'fa-solid fa-question', bg: 'bg-slate-800', tailwind: 'text-slate-400' };
                                                    const amountColor = t.tipo_transaccion === 'Gasto' ? 'text-rose-400' : t.tipo_transaccion === 'Ingreso' ? 'text-emerald-400' : 'text-blue-400';
                                                    const isPending = !t.validado;
                                                    const stagger = (idx % 20) * 15;

                                                    return (
                                                        <div key={t.id} onClick={() => checkBudgetGuard(() => { setSelectedTransaction(t); setTransactionModalOpen(true); })} style={{ animationDelay: `${stagger}ms` }} className={`flex flex-col p-4 bg-slate-900 border ${isPending ? 'border-yellow-500 shadow-[0_0_15px_rgba(234,179,8,0.1)]' : 'border-slate-800/60'} rounded-[20px] active:scale-[0.98] transition-all cursor-pointer relative overflow-hidden animate-enter`}>

                                                            {/* Contenedor Superior: Icono, Nombre y Monto */}
                                                            <div className="flex justify-between items-center w-full">
                                                                <div className="flex items-center gap-4 overflow-hidden z-10">
                                                                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center shrink-0 ${meta.bg} ${meta.tailwind}`}>
                                                                        <i className={`${meta.iconClass} text-lg`}></i>
                                                                    </div>
                                                                    <div className="min-w-0">
                                                                        {t.isTransferPair ? (
                                                                            <>
                                                                                <p className="text-sm font-bold text-slate-200 mb-0.5 truncate">{accountMap[t.destAccount]}</p>
                                                                                <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wide truncate">Desde: {accountMap[t.sourceAccount]}</p>
                                                                            </>
                                                                        ) : (
                                                                            <>
                                                                                <p className={`text-sm font-bold mb-0.5 truncate ${isPending ? 'text-yellow-100 italic' : 'text-slate-200'}`}>{t.nombre}</p>
                                                                                <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wide truncate flex items-center gap-1 flex-wrap">
                                                                                    {isPending ? (
                                                                                        <span className="text-yellow-500 font-black tracking-wider flex items-center gap-1">GESTIONAR <i className="fa-solid fa-arrow-right text-[8px]"></i> {meta.nombre}</span>
                                                                                    ) : (
                                                                                        <span>{meta.nombre}</span>
                                                                                    )}
                                                                                    <span className="opacity-50">•</span> {accountMap[t.cuenta]}
                                                                                    {t.excluir_presupuesto && (
                                                                                        <span className="ml-1 bg-amber-500/10 text-amber-500 px-1.5 py-0.5 rounded text-[8px] font-black border border-amber-500/20 shadow-sm animate-enter">EXCLUIDO</span>
                                                                                    )}
                                                                                    {(() => {
                                                                                        const sData = t.split_data ? trySafeJSON(t.split_data, null, t.concepto) : null;
                                                                                        const isForcedDebt = sData && sData.splitMode === 'IOWE';
                                                                                        const isForcedCredit = sData && sData.splitMode === 'THEY';

                                                                                        if (t.es_por_pagar || isForcedDebt) {
                                                                                            return (
                                                                                                <span className="ml-1 bg-rose-500/10 text-rose-400 px-1.5 py-0.5 rounded text-[8px] font-black border border-rose-500/20 shadow-sm animate-enter">
                                                                                                    DEUDA {sData && ` (${sData.data.find(x => x.id !== 'PER-YO')?.nombre})`}
                                                                                                </span>
                                                                                            );
                                                                                        }
                                                                                        if (t.es_por_cobrar || isForcedCredit) {
                                                                                            return (
                                                                                                <span className="ml-1 bg-blue-500/10 text-blue-400 px-1.5 py-0.5 rounded text-[8px] font-black border border-blue-500/20 shadow-sm animate-enter">
                                                                                                    POR COBRAR {sData && ` (${sData.data.find(x => x.id !== 'PER-YO')?.nombre})`}
                                                                                                </span>
                                                                                            );
                                                                                        }
                                                                                        return null;
                                                                                    })()}
                                                                                </p>
                                                                            </>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                                <div className="text-right shrink-0 ml-2 z-10">
                                                                    <div className={`text-base font-black ${amountColor}`}><Price amount={t.ajuste} /></div>
                                                                    <p className="text-[12px] text-slate-600 font-bold mt-1 uppercase">
                                                                        {(() => {
                                                                            const [datePart] = t.fecha.split('T');
                                                                            const [y, m, d] = datePart.split('-');
                                                                            const monthNames = ['ENE', 'FEB', 'MAR', 'ABR', 'MAY', 'JUN', 'JUL', 'AGO', 'SEP', 'OCT', 'NOV', 'DIC'];
                                                                            return `${d}-${monthNames[parseInt(m) - 1]}`;
                                                                        })()}
                                                                    </p>
                                                                </div>
                                                            </div>

                                                            {/* --- BOTÓN DE ABONO (only for split movements) --- */}
                                                            {(() => {
                                                                try {
                                                                    const sData = t.split_data ? (typeof t.split_data === 'object' ? t.split_data : trySafeJSON(t.split_data, null, t.concepto)) : null;
                                                                    // Debemos ocultar el botón si:
                                                                    // 1. NO hay split_data (no es un compartido)
                                                                    // 2. TODOS los terceros ya pagaron (sData.data excluyendo PER-YO todos tienen paidStatus: true)
                                                                    if (!sData || !sData.data) return (t.es_por_cobrar || t.es_por_pagar);
                                                                    const hasPendingothers = sData.data.some(p => p.id !== 'PER-YO' && !p.paidStatus);
                                                                    // Si es "Yo debo", el botón debe salir solo si yo mismo (PER-YO) no he pagado
                                                                    // Pero por ahora, el requerimiento es que si ya no me deben nada o yo no debo nada según el split, se oculte.
                                                                    return hasPendingothers || t.es_por_cobrar || t.es_por_pagar;
                                                                } catch (e) { return false; }
                                                            })() && (
                                                                    <div className="mt-3 pt-3 border-t border-slate-800/50 w-full animate-enter">
                                                                        <button
                                                                            onClick={(e) => {
                                                                                e.stopPropagation();
                                                                                setAbonoData(t);
                                                                                setAbonoModalOpen(true);
                                                                            }}
                                                                            className={`w-full py-2.5 rounded-xl text-[10px] font-black uppercase tracking-[0.1em] flex items-center justify-center gap-2 transition-all ${(() => {
                                                                                const sData = t.split_data ? trySafeJSON(t.split_data, null, t.concepto) : null;
                                                                                return (t.es_por_pagar || (sData && sData.splitMode === 'IOWE')) ? 'bg-rose-500/10 border-rose-500/20 text-rose-400 hover:bg-rose-500/20' : 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400 hover:bg-emerald-500/20';
                                                                            })()}`}
                                                                        >
                                                                            <i className={`fa-solid ${(() => {
                                                                                const sData = t.split_data ? trySafeJSON(t.split_data, null, t.concepto) : null;
                                                                                return (t.es_por_pagar || (sData && sData.splitMode === 'IOWE')) ? 'fa-circle-dollar-to-slot' : 'fa-hand-holding-dollar';
                                                                            })()} text-xs`}></i>
                                                                            {(() => {
                                                                                const sData = t.split_data ? trySafeJSON(t.split_data, null, t.concepto) : null;
                                                                                return (t.es_por_pagar || (sData && sData.splitMode === 'IOWE')) ? "Liquidar Deuda" : (t.es_por_cobrar ? "Liquidar Cobro" : "Cobrar Pendiente");
                                                                            })()}
                                                                        </button>
                                                                    </div>
                                                                )}
                                                        </div>
                                                    )
                                                })}
                                            </>
                                        )}
                                        {!showDebtOnly && visibleCount < filteredData.length && (
                                            <div className="flex justify-center py-4">
                                                <button onClick={() => setVisibleCount(prev => prev + 20)} className="px-6 py-2.5 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 text-xs font-bold uppercase tracking-wider rounded-2xl transition-all active:scale-95">
                                                    Ver más ({filteredData.length - visibleCount} restantes)
                                                </button>
                                            </div>
                                        )}
                                        {!showDebtOnly && (
                                            <div className="flex flex-col items-center justify-center py-8 pb-32 animate-enter">
                                                <button
                                                    onClick={() => handleMonthChange(-1)}
                                                    className="flex flex-col items-center gap-1 group active:scale-90 transition-all"
                                                >
                                                    <span className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 group-hover:text-blue-400">
                                                        Mes Anterior {new Date(filterYear, filterMonth - 2).toLocaleString('es-MX', { month: 'short' }).toUpperCase()} {filterMonth === 1 ? filterYear - 1 : filterYear}
                                                    </span>
                                                    <i className="fa-solid fa-chevron-down text-slate-600 group-hover:text-blue-500 transition-colors"></i>
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                            {activeTab === 'stats' && (
                                <div className="tab-content-section animate-fade-in">
                                    <section className="justify-center items-center px-6 pt-4 mb-6 relative">
                                        <div className="relative w-full aspect-square max-h-72 mx-auto">
                                            <div className={`transition-all duration-700 ${Object.keys(summary.categoriasGasto).length > 0 ? 'opacity-100' : 'opacity-0'}`}>
                                                <canvas ref={chartRef}></canvas>
                                            </div>
                                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none flex-col">
                                                <div className={`transition-all duration-500 flex flex-col items-center gap-1 ${Object.keys(summary.categoriasGasto).length > 0 && summary.gastos > 0 ? 'opacity-100' : 'opacity-0 translate-y-4'}`}>
                                                    <span className="text-[10px] text-slate-500 uppercase font-black tracking-[0.2em] opacity-80">Total Gastado</span>
                                                    <div className="text-3xl font-black text-white leading-tight">
                                                        <Price amount={summary.gastos} />
                                                    </div>
                                                </div>
                                                <div className={`absolute inset-0 flex flex-col items-center justify-center transition-all duration-500 ${Object.keys(summary.categoriasGasto).length === 0 ? 'opacity-40' : 'opacity-0 pointer-events-none'}`}>
                                                    <i className="fa-solid fa-chart-pie text-5xl mb-3 text-slate-700"></i>
                                                    <span className="text-xs text-slate-500 uppercase font-bold tracking-[0.2em]">Sin Movimientos</span>
                                                </div>
                                            </div>
                                        </div>
                                    </section>
                                    <h3 className="text-slate-400 text-xs font-bold uppercase tracking-widest px-5 sticky-sub-header animate-stagger-up" style={{ animationDelay: '100ms' }}>Por Categoría</h3>
                                    <div className="section-content space-y-4 pb-24">{Object.entries(summary.categoriasGasto).sort((a, b) => b[1] - a[1]).map(([catId, amount], i) => { const meta = richConfig[catId] || { nombre: 'Otros', iconClass: 'fa-solid fa-tag', bg: 'bg-slate-800', tailwind: 'text-slate-400' }; const pct = (amount / summary.gastos * 100).toFixed(0); return (<div key={catId} className="bg-slate-900 p-4 rounded-2xl border border-slate-800 animate-stagger-up" style={{ animationDelay: `${i * 60}ms` }}><div className="flex justify-between items-center mb-3"><div className="flex items-center gap-3"><div className={`p-2 rounded-lg ${meta.bg} ${meta.tailwind}`}><i className={`${meta.iconClass} text-xl`}></i></div><span className="text-sm font-bold text-slate-200">{meta.nombre}</span></div><div className="text-sm font-black text-white"><Price amount={amount} /></div></div><div className="flex items-center gap-3"><div className="w-full bg-slate-800 rounded-full h-2 flex-1"><div className={`h-2 rounded-full ${meta.bg.replace('/20', '')}`} style={{ width: `${pct}%` }}></div></div><span className="text-[10px] text-slate-500 font-bold w-8 text-right">{pct}%</span></div></div>) })}</div>
                                </div>
                            )}
                        </main>

                        {activeTab === 'moves' && (<button onClick={() => { setSelectedTransaction(null); setModalPreset(null); setTransactionModalOpen(true); }} className="absolute bottom-28 right-6 w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-2xl shadow-blue-600/40 hover:scale-110 active:scale-90 transition-all z-40 border border-white/10"><i className="fa-solid fa-plus text-2xl"></i></button>)}

                        {/* BLOQUE DE MODALES ÚNICO Y LIMPIO */}
                        {configModalOpen && (
                            <ConfigModal
                                isOpen={configModalOpen}
                                onClose={() => setConfigModalOpen(false)}
                                item={editingItem || {}}
                                type={editingType}
                                db={rawDB}
                                onSave={handleSaveConfig}
                                onDeleteRequest={handleDeleteRequest}
                                setFluxaAlert={setFluxaAlert}
                                categoriasConfig={richConfig}
                            />
                        )}
                        {transactionModalOpen && (
                            <TransactionModal
                                isOpen={transactionModalOpen}
                                onClose={() => setTransactionModalOpen(false)}
                                transaction={selectedTransaction}
                                db={rawDB}
                                onSave={handleSaveTransaction}
                                onDeleteRequest={handleDeleteTransactionRequest}
                                initialPreset={selectedTransaction ? null : modalPreset}
                                categoriasConfig={richConfig}
                                onViewHistory={(accountId) => {
                                    setFilterAccount(accountId);
                                    setFilterCategory('all');
                                    setSearchQuery('');
                                    setActiveTab('moves');
                                    setTransactionModalOpen(false);
                                }}
                            />
                        )}
                        <AccountActionModal
                            isOpen={accountActionModalOpen}
                            onClose={() => setAccountActionModalOpen(false)}
                            account={selectedAccountForAction}
                            onViewHistory={(accountId) => {
                                setFilterAccount(accountId);
                                setFilterCategory('all');
                                setSearchQuery('');
                                setActiveTab('moves');
                            }}
                            onCreateTransaction={(accountId) => {
                                openQuickTransaction('TR-GASTO', accountId);
                            }}
                            onAdjust={(account) => {
                                setInitialAdjustAccount(account);
                                setAdjustModalOpen(true);
                            }}
                        />

                        <PersonDebtModal
                            isOpen={personDebtModalOpen}
                            onClose={() => setPersonDebtModalOpen(false)}
                            personData={selectedPersonDebt}
                            transactions={transactions}
                            db={rawDB}
                            onConfirm={handlePersonPayment}
                            onOmit={handleOmitPersonDebt}
                        />

                        <AccountAdjustModal
                            isOpen={adjustModalOpen}
                            onClose={() => { setAdjustModalOpen(false); setInitialAdjustAccount(null); }}
                            accounts={rawDB.cuentas}
                            summary={summary}
                            initialAccount={initialAdjustAccount}
                            onApply={(adjustments) => {
                                if (adjustments.length === 0) return;
                                setLoading(true);
                                if (typeof google !== 'undefined' && google.script) {
                                    google.script.run.withSuccessHandler(() => {
                                        loadData();
                                        setFluxaToast({
                                            open: true,
                                            message: `Ajustes registrados`,
                                            icon: "fa-check-double"
                                        });
                                    }).applyBalanceAdjustments(adjustments);
                                } else {
                                    setTimeout(() => setLoading(false), 800);
                                }
                            }}
                        />

                        <DefaultBudgetModal
                            isOpen={defaultBudgetModalOpen}
                            onClose={() => setDefaultBudgetModalOpen(false)}
                            value={defaultBudget}
                            onSave={(val) => {
                                setDefaultBudget(val);
                                if (typeof google !== 'undefined' && google.script) {
                                    google.script.run.saveBudget(0, 0, val);
                                    setFluxaAlert({
                                        open: true,
                                        title: "Actualizado",
                                        message: "El presupuesto base ha sido actualizado exitosamente.",
                                        onConfirm: () => { }
                                    });
                                }
                            }}
                        />

                        <ConfirmModal isOpen={confirmModalOpen} onClose={() => setConfirmModalOpen(false)} onConfirm={itemToDelete ? confirmDelete : confirmDeleteTransaction} title={itemToDelete ? "Confirmar Eliminación" : "Eliminar Movimiento"} message={itemToDelete ? "Esta acción borrará la configuración, pero mantendrá el historial asociado." : "Esta acción borrará este movimiento permanentemente."} isTransactionDelete={!itemToDelete} />
                        <AbonoModal isOpen={abonoModalOpen} onClose={() => setAbonoModalOpen(false)} transaction={abonoData} db={rawDB} onConfirm={handleConfirmAbono} onOmit={handleOmitAbono} />

                        <nav className="absolute bottom-6 left-4 right-4 bg-slate-900/95 backdrop-blur-xl border border-slate-800 rounded-2xl py-4 px-6 flex justify-between shadow-2xl z-50 ring-1 ring-white/5">
                            {[
                                { id: 'home', icon: Wallet },
                                { id: 'moves', icon: HistoryIcon },
                                { id: 'stats', icon: PieChart },
                                { id: 'insights', icon: Lightbulb },
                                { id: 'settings', icon: Settings }
                            ].map((tab) => (
                                <button
                                    key={`nav-tab-${tab.id}`}
                                    onClick={() => {
                                        if ((configModalOpen || transactionModalOpen || isEditingBudget)) {
                                            checkBudgetGuard(() => {
                                                setConfigModalOpen(false);
                                                setTransactionModalOpen(false);
                                                setIsEditingBudget(false);
                                                setActiveTab(tab.id);
                                            });
                                            return;
                                        }
                                        setActiveTab(tab.id);
                                    }}
                                    className={`transition-all duration-200 ${activeTab === tab.id ? 'text-blue-500 scale-110 drop-shadow-[0_0_10px_rgba(59,130,246,0.5)]' : 'text-slate-600 hover:text-slate-400'}`}
                                >
                                    <tab.icon size={24} strokeWidth={activeTab === tab.id ? 2.5 : 2} />
                                </button>
                            ))}
                            <button onClick={() => loadData(true)} disabled={isRefreshing} className={`h-10 w-10 flex items-center justify-center rounded-xl transition-all duration-300 font-bold bg-blue-600 text-white active:scale-90`}><RotateCw size={18} className={isRefreshing ? 'animate-spin' : ''} style={isRefreshing ? { animationDuration: '0.8s' } : {}} /></button>
                        </nav>

                        {/* ALERTA DE DISEÑO FUERA DEL NAV PARA QUE EL Z-INDEX FUNCIONE */}
                        <FluxaConfirm
                            isOpen={fluxaAlert.open}
                            onClose={() => setFluxaAlert({ ...fluxaAlert, open: false })}
                            onConfirm={fluxaAlert.onConfirm}
                            title={fluxaAlert.title}
                            message={fluxaAlert.message}
                            confirmText={fluxaAlert.confirmText}
                            cancelText={fluxaAlert.cancelText}
                            isDanger={false}
                        />

                        <FluxaToast
                            isOpen={fluxaToast.open}
                            onClose={() => setFluxaToast({ ...fluxaToast, open: false })}
                            message={fluxaToast.message}
                            icon={fluxaToast.icon}
                        />

                    </div>
                    {/* Indicador de Guardado Global */}
                    {saving && <FancyLoader />}

                    {/* Loader de Inicio con Transición */}
                    {loading && <FancyLoader isFading={isFadingLoader} />}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>

</html>
