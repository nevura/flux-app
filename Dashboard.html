            const isError = icon.includes('xmark');
            const dotColor = isError ? 'bg-rose-500' : 'bg-emerald-500';
            const iconColor = isError ? 'text-rose-400' : 'text-emerald-400';

            return (
                <div className="fixed top-3 left-1/2 -translate-x-1/2 z-[1000] w-full max-w-sm pointer-events-none px-4">
                    <div
                        ref={toastRef}
                        onTouchStart={onTouchStart}
                        onTouchEnd={onTouchEnd}
                        onClick={dismiss}
                        className={`bg-slate-900/95 backdrop-blur-xl border border-slate-700/40 rounded-2xl px-5 py-4 shadow-2xl flex items-center gap-4 pointer-events-auto cursor-pointer ${exiting ? 'animate-toast-exit' : 'animate-toast-enter'}`}
                    >
                        <div className={`w-9 h-9 ${dotColor}/15 ${iconColor} rounded-xl flex items-center justify-center text-sm shrink-0`}>
                            <i className={`fa-solid ${icon}`}></i>
                        </div>
                        <p className="text-[13px] font-bold text-slate-200 leading-tight flex-1">{message}</p>
                        <div className="text-slate-600 text-[11px] shrink-0"><i className="fa-solid fa-xmark"></i></div>
                    </div>
                </div>
            );
        };

        const FluxaConfirm = ({ isOpen, onClose, onConfirm, title, message, confirmText = "Confirmar", cancelText = "Cancelar", isDanger = false }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[500] flex items-center justify-center px-6 animate-enter">
                    <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="bg-slate-900 w-full max-w-sm rounded-[32px] p-8 relative z-10 border border-slate-800 shadow-2xl text-center">
                        <div className={`w-16 h-16 ${isDanger ? 'bg-rose-500/10 text-rose-500' : 'bg-blue-500/10 text-blue-500'} rounded-full flex items-center justify-center text-2xl mb-6 mx-auto`}>
                            <i className={`fa-solid ${isDanger ? 'fa-triangle-exclamation' : 'fa-circle-question'}`}></i>
                        </div>
                        <h3 className="text-xl font-black text-white mb-2 uppercase tracking-tight">{title}</h3>
                        <p className="text-sm text-slate-400 text-center mb-8 px-2 leading-relaxed font-medium">{message}</p>
                        <div className="flex gap-3">
                            <button onClick={onClose} className="flex-1 py-4 rounded-2xl bg-slate-800 text-slate-300 font-black text-xs uppercase tracking-widest">{cancelText}</button>
                            <button onClick={() => { onConfirm(); onClose(); }} className={`flex-1 py-4 rounded-2xl ${isDanger ? 'bg-rose-600' : 'bg-blue-600'} text-white font-black text-xs uppercase tracking-widest shadow-lg`}>
                                {confirmText}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const DefaultBudgetModal = ({ isOpen, onClose, value, onSave }) => {
            const [localVal, setLocalVal] = useState(value);
            useEffect(() => { setLocalVal(value); }, [value]);

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[501] flex items-end justify-center bg-slate-950/80 backdrop-blur-sm animate-fade-in">
                    <div className="bg-slate-900 w-full max-w-md rounded-t-[40px] border-t border-slate-800 shadow-2xl animate-slide-up p-8">
                        <div className="flex justify-between items-center mb-8">
                            <div>
                                <h3 className="text-xl font-black text-white uppercase tracking-tight leading-tight">Presupuesto Base</h3>
                                <p className="text-[10px] text-slate-500 font-black uppercase tracking-widest">Ajuste Global Predeterminado</p>
                            </div>
                            <button onClick={onClose} className="w-10 h-10 rounded-full bg-slate-800 text-slate-400 flex items-center justify-center"><i className="fa-solid fa-xmark"></i></button>
                        </div>

                        <div className="space-y-6">
                            <div className="bg-slate-800/50 rounded-[32px] p-6 border border-slate-800">
                                <label className="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-3 block text-center">Monto Mensual Base</label>
                                <div className="flex items-center justify-center gap-4">
                                    <span className="text-3xl font-black text-slate-600">$</span>
                                    <input
                                        type="number"
                                        value={localVal}
                                        onChange={e => setLocalVal(parseInt(e.target.value) || 0)}
                                        className="bg-transparent text-5xl font-black text-white outline-none w-full text-center placeholder:text-slate-800"
                                        autoFocus
                                    />
                                </div>
                            </div>
                            <p className="text-[11px] text-slate-500 font-medium italic text-center px-4 leading-relaxed">
                                Este monto se aplicará automáticamente a todos los meses que no tengan un presupuesto específico configurado.
                            </p>

                            <button
                                onClick={() => { onSave(localVal); onClose(); }}
                                className="w-full py-5 rounded-[24px] bg-blue-600 text-white font-black uppercase tracking-widest text-sm shadow-xl shadow-blue-900/40 active:scale-95 transition-all flex items-center justify-center gap-3"
                            >
                                <i className="fa-solid fa-cloud-arrow-up"></i>
                                Actualizar Base
                            </button>
                        </div>
                    </div>
                </div>
            );
        };



        const ConfigModal = ({ isOpen, onClose, type, item, db, onSave, setFluxaAlert, categoriasConfig }) => {
            const [formData, setFormData] = useState(item || {});
            const [dateInput, setDateInput] = useState("");
            const [isShared, setIsShared] = useState(false);

            useEffect(() => {
                if (isOpen && item) {
                    setFormData({ ...item });

                    // Asegurar que detectamos el split_data incluso si viene como string
                    const sd = trySafeJSON(item.split_data, null, "ConfigModal check");
                    setIsShared(!!sd);

                    if (item.proximo_cobro) {
                        const d = new Date(item.proximo_cobro);
                        if (!isNaN(d.getTime())) {
                            setDateInput(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`);
                        }
                    } else {
                        setDateInput("");
                    }
                    if (type === 'plan' && !item.id_transaccion) {
                        setFormData(prev => ({ ...prev, id_transaccion: 'TR-GASTO', estado: 'ACTIVO', frecuencia_num: 1, frecuencia_unidad: 'Meses' }));
                    }
                }
            }, [item, isOpen, type]);

            if (!isOpen) return null;

            const hasUnsavedChanges = () => {
                const original = item || {};
                const keysToCheck = type === 'plan'
                    ? ['nombre', 'cantidad', 'id_categoria', 'id_cuenta', 'id_transaccion', 'frecuencia_num', 'frecuencia_unidad', 'dia_pago', 'dias_notificacion', 'estado', 'id_destino']
                    : type === 'cat'
                        ? ['nombre', 'id_icon', 'id_color']
                        : type === 'acc'
                            ? ['nombre', 'id_metodo_pago', 'dia_pago']
                            : ['nombre'];
                return keysToCheck.some(k => String(formData[k] || '') !== String(original[k] || ''));
            };

            const handleClose = () => {
                if (hasUnsavedChanges()) {
                    setFluxaAlert({
                        open: true,
                        title: "Cambios sin guardar",
                        message: "¿Estás seguro de que quieres salir? Los cambios no guardados se perderán.",
                        confirmText: "Salir",
                        cancelText: "Seguir Editando",
                        onConfirm: () => {
                            setFluxaAlert(prev => ({ ...prev, open: false }));
                            onClose();
                        }
                    });
                } else {
                    onClose();
                }
            };

            const handleDateChange = (e) => {
                const val = e.target.value; // Esto es YYYY-MM-DD
                setDateInput(val);
                if (val) {
                    const cleanISO = val + "T12:00:00"; // Sin Z
                    const dayNumber = parseInt(val.split('-')[2]); // Extrae el día del string
                    setFormData(prev => ({
                        ...prev,
                        proximo_cobro: cleanISO,
                        dia_pago: dayNumber
                    }));
                }
            };

            const categoriasVisibles = Object.values(categoriasConfig || {}).filter(cat => {
                const id = String(cat.id_categoria || '').toUpperCase().trim();
                const name = String(cat.nombre || '').toLowerCase();
                // FILTRO ESTRICTO: No Apple, No Transferencias, No Traspasos
                const forbiddenIds = ['CAT-APPLE', 'CAT-TRANSFER', 'CAT_TRANSFER', 'CAT-DEF-TRANSFER'];
                const forbiddenNames = ['apple pay', 'transferencia', 'traspaso'];
                return !forbiddenIds.includes(id) && !forbiddenNames.some(n => name.includes(n));
            });

            const isExpense = formData.id_transaccion === 'TR-GASTO';

            return (
                <div className="fixed inset-0 z-[140] flex items-end justify-center sm:items-center">
                    <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" onClick={handleClose}></div>
                    <div className="bg-slate-900 w-full max-w-md rounded-t-[40px] sm:rounded-[40px] border-t border-slate-800 shadow-2xl relative z-10 animate-slide-up p-8 mb-safe pb-10 sm:h-auto max-h-[99vh] overflow-y-auto no-scrollbar flex flex-col">

                        <div className="flex justify-between items-center mb-6 shrink-0 px-2">
                            <button onClick={handleClose} className="w-8 h-8 flex items-center justify-center bg-slate-800 rounded-full text-slate-400 hover:text-white"><i className="fa-solid fa-xmark"></i></button>
                            <h2 className="text-lg font-bold text-white uppercase tracking-tight">
                                {type === 'persona' ? 'Contacto' : type === 'acc' ? 'Cuenta' : type === 'cat' ? 'Categoría' : 'Planificado'}
                            </h2>
                            {type === 'plan' ? (
                                <div onClick={() => setFormData(p => ({ ...p, estado: p.estado === 'ACTIVO' ? 'INACTIVO' : 'ACTIVO' }))} className={`w-12 h-7 rounded-full relative cursor-pointer transition-colors ${formData.estado === 'ACTIVO' ? 'bg-emerald-500' : 'bg-slate-700'}`}>
                                    <div className={`absolute top-1 w-5 h-5 rounded-full bg-white transition-transform ${formData.estado === 'ACTIVO' ? 'translate-x-6' : 'translate-x-1'}`}></div>
                                </div>
                            ) : <div className="w-8"></div>}
                        </div>

                        <div className="space-y-6 overflow-y-auto no-scrollbar flex-1 pb-12">
                            {/* CASO: CONTACTO */}
                            {type === 'persona' && (
                                <div>
                                    <label className="text-[10px] text-slate-500 uppercase font-black ml-1">Nombre Completo</label>
                                    <input type="text" value={formData.nombre || ''} onChange={e => setFormData({ ...formData, nombre: e.target.value })} className="w-full bg-slate-800 text-white rounded-2xl px-4 py-4 mt-1 border border-slate-700 font-bold outline-none text-[16px]" />
                                </div>
                            )}

                            {/* CASO: CATEGORÍA */}
                            {type === 'cat' && (
                                <div className="space-y-6">
                                    {/* Nombre de la Categoría */}
                                    <div>
                                        <label className="text-[10px] text-slate-500 uppercase font-black ml-1">Nombre</label>
                                        <input
                                            type="text"
                                            value={formData.nombre || ''}
                                            onChange={e => setFormData({ ...formData, nombre: e.target.value })}
                                            className="w-full bg-slate-800 text-white rounded-xl px-4 py-4 border border-slate-700 font-bold text-[16px] outline-none focus:border-blue-500 transition-colors"
                                            placeholder="Ej. Gimnasio..."
                                        />
                                    </div>

                                    {/* Selector de Icono */}
                                    <div>
                                        <label className="text-[10px] text-slate-500 uppercase font-black ml-1">Icono</label>
                                        <div className="grid grid-cols-6 gap-3 mt-2 mx-0.5">
                                            {db.icons.map(ic => (
                                                <button
                                                    key={`icon-sel-${ic.id_icon}`}
                                                    type="button"
                                                    onClick={() => setFormData({ ...formData, id_icon: ic.id_icon })}
                                                    className={`aspect-square rounded-xl flex items-center justify-center text-3xl transition-all ${formData.id_icon === ic.id_icon ? 'bg-blue-600 text-white scale-105 shadow-lg shadow-blue-600/20' : 'bg-slate-800 text-slate-500 hover:bg-slate-700'}`}
                                                >
                                                    <i className={ic.icon_base}></i>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* SECCIÓN DE COLORES (NUEVA) */}
                                    <div>
                                        <label className="text-[10px] text-slate-500 uppercase font-black ml-1">Color</label>
                                        <div className="grid grid-cols-6 gap-3 mt-2 mx-0.5 p-1">
                                            {db.colores.map(col => (
                                                <button
                                                    key={`col-sel-${col.id_color}`}
                                                    type="button"
                                                    onClick={() => setFormData({ ...formData, id_color: col.id_color })}
                                                    className={`aspect-square rounded-full border-2 transition-all flex items-center justify-center ${formData.id_color === col.id_color
                                                        ? 'border-white scale-110 shadow-lg'
                                                        : 'border-transparent opacity-60 hover:opacity-100 hover:scale-105'
                                                        }`}
                                                    style={{ backgroundColor: col.hex }}
                                                >
                                                    {formData.id_color === col.id_color && (
                                                        <i className="fa-solid fa-check text-white text-[10px] drop-shadow-md"></i>
                                                    )}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* CASO: CUENTA CON DÍA DE PAGO RESTAURADO */}
                            {type === 'acc' && (
                                <div className="space-y-5">
                                    <div>
                                        <label className="text-[10px] text-slate-500 uppercase font-black ml-1">Nombre de la Cuenta</label>
                                        <input type="text" value={formData.nombre || ''} onChange={e => setFormData({ ...formData, nombre: e.target.value })} className="w-full bg-slate-800 text-white rounded-2xl px-4 py-4 border border-slate-700 font-bold text-[16px]" />
                                    </div>
                                    <div className="grid grid-cols-3 gap-2">
                                        {db.metodo_pago?.map(mp => (
                                            <button key={`pm-${mp.id_metodo_pago}`} type="button" onClick={() => setFormData({ ...formData, id_metodo_pago: mp.id_metodo_pago })} className={`py-3 rounded-xl text-[16px] border font-bold transition-all ${formData.id_metodo_pago === mp.id_metodo_pago ? 'bg-blue-600 border-blue-500 text-white' : 'bg-slate-800 border-slate-700 text-slate-500'}`}>{mp.nombre}</button>
                                        ))}
                                    </div>
                                    {/* DÍA DE PAGO RESTAURADO PARA TDC */}
                                    {formData.id_metodo_pago === 'MP-TDC' && (
                                        <div className="animate-enter">
                                            <label className="text-[10px] text-slate-500 uppercase font-black ml-1">Día de Pago</label>
                                            <input type="number" inputMode="decimal" value={formData.dia_pago || ''} onChange={e => setFormData({ ...formData, dia_pago: e.target.value })} className="w-full text-center bg-slate-800 text-white rounded-xl px-4 py-4 mt-1 border border-slate-700 font-bold text-[16px]" placeholder="Ej. 15" />
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* CASO: PLAN RECURRENTE CON GRID CORREGIDO PARA EVITAR DESBORDAMIENTO */}
                            {type === 'plan' && (
                                <div className="space-y-6">
                                    <div className="flex bg-slate-800 rounded-xl p-1 shrink-0">
                                        {['TR-GASTO', 'TR-INGRESO'].map(t => (<button key={t} type="button" onClick={() => setFormData({ ...formData, id_transaccion: t })} className={`flex-1 py-2.5 rounded-lg text-[14px] font-black uppercase transition-all ${formData.id_transaccion === t ? 'bg-blue-600 text-white' : 'text-slate-500'}`}>{t === 'TR-GASTO' ? 'Gasto' : 'Ingreso'}</button>))}
                                    </div>
                                    <div className="text-center">
                                        <label className="text-[10px] text-slate-500 uppercase font-black tracking-widest opacity-60">Monto</label>
                                        <div className="flex items-center justify-center gap-2">
                                            <span className="text-2xl text-slate-500 font-bold">$</span>
                                            <input type="number" inputMode="decimal" value={formData.cantidad} onChange={e => setFormData({ ...formData, cantidad: e.target.value })} className="bg-transparent text-5xl font-black text-white w-48 text-center outline-none border-b border-slate-800 focus:border-purple-500 text-[36px]" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] text-slate-500 uppercase font-black ml-1">Concepto</label>
                                        <input type="text" value={formData.nombre || ''} onChange={e => setFormData({ ...formData, nombre: e.target.value })} className="w-full bg-slate-800 text-white rounded-2xl px-4 py-4 mt-1 border border-slate-700 font-bold outline-none text-[16px]" />
                                    </div>

                                    {/* GRID DE FRECUENCIA Y FECHA SIN DESBORDAMIENTO */}
                                    <div className="flex flex-col gap-4">
                                        <div className="flex gap-3">
                                            <div className="w-24 shrink-0">
                                                <label className="text-[10px] text-slate-500 uppercase font-black ml-1">Frecuencia</label>
                                                <input type="number" inputMode="decimal" value={formData.frecuencia_num || 1} onChange={e => setFormData({ ...formData, frecuencia_num: parseFloat(e.target.value) || 1 })} className="w-full bg-slate-800 text-white rounded-xl py-4 border border-slate-700 font-bold text-center outline-none text-[16px]" />
                                            </div>
                                            <div className="flex-1">
                                                <label className="text-[10px] text-slate-500 uppercase font-black ml-1 opacity-0">-</label>
                                                <select value={formData.frecuencia_unidad || 'Meses'} onChange={e => setFormData({ ...formData, frecuencia_unidad: e.target.value })} className="w-full text-center bg-slate-800 text-white rounded-xl px-4 py-4 border border-slate-700 font-bold appearance-none text-[16px] outline-none">
                                                    <option value="Meses">Meses</option><option value="Semanas">Semanas</option><option value="Años">Años</option><option value="Días">Días</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[10px] text-slate-500 uppercase font-black ml-1">Fecha de Próximo Cobro</label>
                                            <input type="date" value={dateInput} onChange={handleDateChange} className="w-full text-center bg-slate-800 text-white rounded-xl px-4 py-4 mt-1 border border-slate-700 font-bold text-[16px] appearance-none outline-none" />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-[10px] text-slate-500 uppercase font-black ml-1">Categoría</label>
                                        <div className="grid grid-cols-4 gap-2 mt-2 mx-0.5">
                                            {categoriasVisibles.map((cat, idx) => (
                                                <button key={`conf-cat-${cat.id_categoria || idx}`} type="button" onClick={() => setFormData({ ...formData, id_categoria: cat.id_categoria })} className={`flex flex-col items-center justify-center p-2 rounded-xl border transition-all ${formData.id_categoria === cat.id_categoria ? 'bg-purple-600/20 border-purple-500 scale-105' : 'bg-slate-800 border-slate-700 opacity-60'}`}>
                                                    <i className={`${cat.iconClass} text-lg mb-1 ${formData.id_categoria === cat.id_categoria ? 'text-purple-400' : 'text-slate-400'}`}></i>
                                                    <span className="text-[8px] font-bold truncate w-full text-center uppercase">{cat.nombre}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] text-slate-500 uppercase font-black ml-1">Cuenta de Cargo/Abono</label>
                                        <div className="grid grid-cols-2 gap-3 mt-1.5 p-2">
                                            {(db.cuentas || []).map((acc, idx) => (
                                                <button key={`conf-acc-${acc.id_cuenta || idx}`} type="button" onClick={() => setFormData({ ...formData, id_cuenta: acc.id_cuenta })} className={`flex flex-col items-center justify-center p-3 rounded-xl border transition-all ${formData.id_cuenta === acc.id_cuenta ? 'bg-blue-600/20 border-blue-500 scale-105 font-bold shadow-lg shadow-blue-600/20' : 'bg-slate-800 border-slate-700 opacity-60 hover:opacity-100'}`}>
                                                    <span className={`text-[12px] font-black ${formData.id_cuenta === acc.id_cuenta ? 'text-blue-400' : 'text-slate-200'}`}>{acc.nombre}</span>
                                                    <span className="text-[9px] text-slate-500 uppercase font-bold mt-0.5">
                                                        {acc.id_metodo_pago === 'MP-TDC' ? 'Crédito' : acc.id_metodo_pago === 'MP-TDD' ? 'Débito' : acc.id_metodo_pago === 'MP-EFECTIVO' ? 'Efectivo' : 'Cuentas'}
                                                    </span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="h-4"></div>
                                    {isExpense && (
                                        <div className="pt-4 border-t border-slate-800">
                                            <div className={`flex justify-between items-center p-4 rounded-2xl border transition-all ${isShared ? 'bg-purple-600/10 border-purple-500/30' : 'bg-slate-800/40 border-slate-700/50'}`}>
                                                <span className="text-[14px] font-black text-slate-200 uppercase tracking-widest leading-tight">Involucrar a otros</span>
                                                <button type="button" onClick={() => setIsShared(!isShared)} className={`w-12 h-6 rounded-full relative transition-colors ${isShared ? 'bg-purple-600' : 'bg-slate-700'}`}><div className={`absolute top-0.5 w-5 h-5 bg-white rounded-full transition-transform ${isShared ? 'translate-x-6' : 'translate-x-1'}`} /></button>
                                            </div>
                                            {isShared && (
                                                <SplitSystem
                                                    totalAmount={parseFloat(formData.cantidad) || 0}
                                                    people={db.personas || []}
                                                    initialData={trySafeJSON(formData.split_data, null, "Split System")}
                                                    onUpdate={(data, flags) => setFormData({ ...formData, split_data: data, ...flags })}
                                                    onNewPerson={(p) => { db.personas.push(p); if (google.script) google.script.run.saveItem('personas', 'id_persona', p); }}
                                                    setFluxaAlert={setFluxaAlert}
                                                    isExpense={isExpense}
                                                    isPlanned={true}
                                                />
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                        <div className="flex gap-3 mt-4 shrink-0 pt-3 border-t border-slate-800">
                            {(formData.id_persona || formData.id_cuenta || formData.id_planificado || formData.id_categoria) && (
                                <button onClick={() => onDeleteRequest(formData)} className="p-4 rounded-xl bg-slate-800 text-rose-500 active:scale-90 transition-transform"><i className="fa-solid fa-trash-can"></i></button>
                            )}
                            <button onClick={() => { onSave(formData, type); onClose(); }} className="flex-1 py-4 rounded-xl bg-blue-600 text-white font-black uppercase tracking-widest text-xs active:scale-[0.98] transition-all">Guardar</button>
                        </div>
                    </div>
                </div>
            );
        };
        const AbonoModal = ({ isOpen, onClose, transaction, db, onConfirm, onOmit }) => {
            const [selectedPerson, setSelectedPerson] = useState("");
            const [amount, setAmount] = useState("");
            const [accountId, setAccountId] = useState("");

            useEffect(() => {
                if (isOpen && db?.cuentas?.length > 0 && !accountId) {
                    setAccountId(db.cuentas[0].id_cuenta);
                }
            }, [isOpen, db]);

            useEffect(() => {
                if (isOpen && transaction?.cuenta) {
                    setAccountId(transaction.cuenta);
                }
            }, [isOpen, transaction]);

            if (!isOpen || !transaction) return null;

            const isPorCobrarDirect = transaction.es_por_cobrar;
            const sData = transaction.split_data ? (typeof transaction.split_data === 'object' ? transaction.split_data : trySafeJSON(transaction.split_data)) : null;
            const isIOWE = sData?.splitMode === 'IOWE';
            const pendingPeople = sData?.data?.filter(p => p.id !== 'PER-YO' && (isIOWE ? p.paidStatus : !p.paidStatus)) || [];

            return (
                <div className="fixed inset-0 z-[200] flex items-end justify-center sm:items-center p-0">
                    <div className="absolute inset-0 bg-slate-950/80 backdrop-blur-md animate-fade-in" onClick={onClose}></div>
                    <div className="bg-slate-900 w-full max-w-md rounded-t-[40px] sm:rounded-[40px] border-t border-slate-800 shadow-2xl animate-slide-up relative z-10 p-8 mb-safe pb-10 sm:h-auto max-h-[99vh] overflow-y-auto no-scrollbar">
                        {/* Header */}
                        <div className="flex justify-between items-start mb-6">
                            <div>
                                <h3 className="text-2xl font-black text-white uppercase tracking-tight leading-tight">
                                    {transaction.es_por_pagar ? 'Pagar Deuda' : 'Registrar Cobro'}
                                </h3>
                                <p className="text-[12px] text-slate-500 font-black uppercase tracking-widest mt-1">
                                    {transaction.es_por_pagar ? 'Liquidación de gastos pendientes' : 'Liquidación de ingresos pendientes'}
                                </p>
                            </div>
                            <button onClick={onClose} className="w-10 h-10 rounded-full bg-slate-800 text-slate-400 flex items-center justify-center shrink-0 hover:bg-slate-700 transition-colors border border-slate-700 shadow-lg"><i className="fa-solid fa-xmark text-lg"></i></button>
                        </div>

                        <div className="space-y-6">
                            {/* Información del Movimiento */}
                            <div className="bg-slate-800/40 rounded-3xl p-4 border border-slate-800/60">
                                <div className="flex items-center gap-4">
                                    <div className="w-10 h-10 bg-blue-500/10 text-blue-500 rounded-2xl flex items-center justify-center text-lg">
                                        <i className={isPorCobrarDirect ? "fa-solid fa-hourglass-start" : "fa-solid fa-people-arrows"}></i>
                                    </div>
                                    <div className="flex-1 overflow-hidden">
                                        <p className="text-[12px] text-slate-500 font-black uppercase tracking-widest leading-none mb-1">Origen</p>
                                        <p className="text-sm font-bold text-white truncate">{transaction.nombre}</p>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-[12px] text-slate-500 font-black uppercase tracking-widest leading-none mb-1">Total</p>
                                        <p className={`text-lg font-black ${transaction.es_por_pagar ? 'text-rose-400' : 'text-emerald-400'}`}><Price amount={transaction.ajuste} /></p>
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-5">
                                {/* Quién paga */}
                                <div className="animate-enter">
                                    <label className="text-[12px] text-slate-400 font-black uppercase tracking-widest ml-1 mb-2 block">
                                        {transaction.es_por_pagar ? '¿A quién le pago?' : '¿Quién me está pagando?'}
                                    </label>
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                                        {isPorCobrarDirect ? (
                                            (() => {
                                                let splitObj = null;
                                                try {
                                                    splitObj = transaction.split_data
                                                        ? (typeof transaction.split_data === 'object' ? transaction.split_data : trySafeJSON(transaction.split_data))
                                                        : null;
                                                } catch (e) { }
                                                const debtors = splitObj?.data?.filter(p => p.id !== 'PER-YO' && !p.paidStatus) || [];
                                                if (debtors.length === 0) return <span className="text-xs text-slate-500 px-3">Persona no asignada</span>;
                                                return debtors.map(p => (
                                                    <button
                                                        key={p.id}
                                                        onClick={() => {
                                                            setSelectedPerson(p.id);
                                                            const pendingAmt = p.value - (p.paidAmount || 0);
                                                            setAmount(pendingAmt.toFixed(2));
                                                        }}
                                                        className={`p-4 min-w-[120px] rounded-2xl border text-xs font-bold transition-all flex flex-col items-center gap-1 shrink-0 ${selectedPerson === p.id ? 'bg-blue-600 border-blue-500 text-white shadow-lg' : 'bg-slate-800/50 border-slate-700 text-slate-400'}`}
                                                    >
                                                        <span className="truncate w-full text-center font-black">{p.nombre}</span>
                                                        <span className={`text-[10px] font-bold ${selectedPerson === p.id ? 'text-blue-100' : 'text-emerald-400'}`}>
                                                            Debe <Price amount={p.value - (p.paidAmount || 0)} />
                                                        </span>
                                                    </button>
                                                ));
                                            })()
                                        ) : (
                                            pendingPeople.map(p => (
                                                <button
                                                    key={p.id}
                                                    onClick={() => {
                                                        setSelectedPerson(p.id);
                                                        const amt = isIOWE ? (sData?.data?.find(x => x.id === 'PER-YO')?.value || transaction.ajuste) : (p.value - p.paidAmount);
                                                        setAmount(Math.abs(amt).toFixed(2));
                                                    }}
                                                    className={`p-4 min-w-[120px] rounded-2xl border text-xs font-bold transition-all flex flex-col items-center gap-1 shrink-0 ${selectedPerson === p.id ? 'bg-blue-600 border-blue-500 text-white shadow-lg' : 'bg-slate-800/50 border-slate-700 text-slate-400'}`}
                                                >
                                                    <span className="truncate w-full text-center font-black">{p.nombre}</span>
                                                    <span className={`text-[10px] font-bold ${selectedPerson === p.id ? 'text-blue-100' : 'text-emerald-400'}`}>
                                                        {isIOWE ? 'Acreedor' : `Debe ${fmt(p.value - p.paidAmount)}`}
                                                    </span>
                                                </button>
                                            ))
                                        )}
                                    </div>
                                </div>

                                {/* Cuenta de Ingreso / Egreso */}
                                <div>
                                    <label className="text-[10px] text-slate-400 font-black uppercase tracking-widest ml-1 mb-2 block">
                                        {transaction.es_por_pagar ? '¿De qué cuenta sale el dinero?' : '¿A qué cuenta ingresa?'}
                                    </label>
                                    <div className="relative">
                                        <select
                                            value={accountId}
                                            onChange={e => setAccountId(e.target.value)}
                                            className="w-full bg-slate-800/50 text-white rounded-2xl px-5 py-4 border border-slate-700 font-bold outline-none text-sm appearance-none focus:border-emerald-500 transition-colors"
                                        >
                                            {db.cuentas.map(c => <option key={c.id_cuenta} value={c.id_cuenta}>{c.nombre}</option>)}
                                        </select>
                                        <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500">
                                            <i className="fa-solid fa-chevron-down"></i>
                                        </div>
                                    </div>
                                </div>

                                {/* Monto */}
                                <div>
                                    <label className="text-[10px] text-slate-400 font-black uppercase tracking-widest ml-1 mb-2 block text-center">Monto a Liquidar</label>
                                    <div className="bg-slate-800/50 rounded-[40px] p-6 border border-slate-700 shadow-inner">
                                        <div className="flex items-center justify-center gap-3">
                                            <span className="text-4xl font-black text-slate-600">$</span>
                                            <input
                                                type="number"
                                                inputMode="decimal"
                                                value={amount}
                                                onChange={e => setAmount(e.target.value)}
                                                className="bg-transparent text-5xl font-black text-white outline-none w-full text-center placeholder:text-slate-800"
                                                placeholder="0.00"
                                            />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Botones de Acción */}
                            <div className="flex gap-3">
                                <button
                                    onClick={() => {
                                        if (!selectedPerson || !amount || parseFloat(amount) <= 0) return;
                                        onConfirm(transaction.id, selectedPerson, parseFloat(amount), accountId);
                                        onClose();
                                    }}
                                    disabled={!selectedPerson || !amount || parseFloat(amount) <= 0}
                                    className={`flex-[2] py-5 rounded-[28px] font-black uppercase tracking-widest text-sm shadow-xl transition-all active:scale-95 ${!selectedPerson || !amount || parseFloat(amount) <= 0
                                        ? 'bg-slate-800 text-slate-600 cursor-not-allowed'
                                        : transaction.es_por_pagar
                                            ? 'bg-rose-600 text-white shadow-rose-900/40'
                                            : 'bg-emerald-600 text-white shadow-emerald-900/40'
                                        }`}
                                >
                                    <i className={`fa-solid ${transaction.es_por_pagar ? 'fa-circle-check' : 'fa-circle-check'} mr-2`}></i>
                                    {transaction.es_por_pagar ? 'Confirmar Pago' : 'Confirmar Cobro'}
                                </button>

                                <button
                                    onClick={() => {
                                        if (!selectedPerson) return;
                                        onOmit(transaction.id, selectedPerson);
                                        onClose();
                                    }}
                                    disabled={!selectedPerson}
                                    className={`flex-1 py-5 rounded-[28px] font-black uppercase tracking-widest text-[10px] transition-all active:scale-95 border ${!selectedPerson ? 'bg-slate-800/50 border-slate-700 text-slate-600 cursor-not-allowed' : 'bg-slate-800 border-slate-700 text-slate-400 hover:text-white hover:bg-slate-700'}`}
                                >
                                    Olvidar
                                </button>
                            </div>
                        </div>
                    </div>
                </div >
            );
        };

        /**
         * PersonDebtModal — Person-centric payment modal.
         * Shows all pending movements for a person (oldest first) and
         * allows partial or total payment applied FIFO by the backend.
         */
        const PersonDebtModal = ({ isOpen, onClose, personData, transactions, db, onConfirm, onOmit }) => {
            const [accountId, setAccountId] = useState(db.cuentas[0]?.id_cuenta || "");
            const [amount, setAmount] = useState(personData?.totalPending ? String(personData.totalPending.toFixed(2)) : "0.00");

            useEffect(() => {
                if (isOpen && personData) {
                    setAmount(String(personData.totalPending.toFixed(2)));
                    setAccountId(db.cuentas[0]?.id_cuenta || "");
                }
            }, [isOpen, personData, db.cuentas]);

            if (!isOpen || !personData) return null;

            const isDebt = personData.type === 'debt';
            const accentColor = isDebt ? 'rose' : 'emerald';

            return (
                <div className="fixed inset-0 z-[200] flex items-end justify-center sm:items-center p-0">
                    <div className="absolute inset-0 bg-slate-950/80 backdrop-blur-md animate-fade-in" onClick={onClose}></div>
                    <div className="bg-slate-900 w-full max-w-md rounded-t-[40px] sm:rounded-[40px] border-t border-slate-800 shadow-2xl relative z-10 animate-slide-up p-8 mb-safe pb-10 sm:h-auto max-h-[99vh] overflow-y-auto no-scrollbar">
                        {/* Header */}
                        <div className="flex justify-between items-start mb-6">
                            <div>
                                <h3 className={`text-2xl font-black text-white uppercase tracking-tight leading-tight`}>
                                    {isDebt ? 'Pagar Deuda' : 'Cobrar Todo'}
                                </h3>
                                <p className="text-[12px] text-slate-500 font-black uppercase tracking-widest mt-1">
                                    {personData.nombre}
                                </p>
                            </div>
                            <button onClick={onClose} className="w-10 h-10 rounded-full bg-slate-800 text-slate-400 flex items-center justify-center shrink-0 hover:bg-slate-700 transition-colors border border-slate-700 shadow-lg">
                                <i className="fa-solid fa-xmark text-lg"></i>
                            </button>
                        </div>

                        <div className="space-y-6">
                            {/* Resumen de Persona */}
                            <div className={`rounded-3xl p-5 border bg-${accentColor}-500/5 border-${accentColor}-500/20`}>
                                <div className="flex justify-between items-center mb-4">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-11 h-11 rounded-2xl bg-${accentColor}-500/10 border border-${accentColor}-500/20 flex items-center justify-center`}>
                                            <i className={`fa-solid fa-user text-${accentColor}-400`}></i>
                                        </div>
                                        <div>
                                            <p className="text-white font-black text-base leading-tight">{personData.nombre}</p>
                                            <p className={`text-[10px] text-${accentColor}-400 font-black uppercase tracking-widest`}>
                                                {isDebt ? 'Les debes' : 'Te deben'}
                                            </p>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-tight mb-1">Saldo a liquidar</p>
                                        <p className={`text-2xl font-black text-${accentColor}-400`}>
                                            <Price amount={personData.totalPending} />
                                        </p>
                                    </div>
                                </div>

                                {/* Desglose */}
                                <div className="flex justify-between items-center border-t border-slate-700/50 pt-4 mt-2">
                                    <div className="text-center flex-1">
                                        <p className="text-[9px] text-slate-500 font-bold uppercase tracking-tight mb-1">Te debe (A favor)</p>
                                        <p className="text-sm font-black text-emerald-400"><Price amount={personData.owesMe} /></p>
                                    </div>
                                    <div className="text-center flex-1 border-l border-slate-700/50">
                                        <p className="text-[9px] text-slate-500 font-bold uppercase tracking-tight mb-1">Le debes (En contra)</p>
                                        <p className="text-sm font-black text-rose-400"><Price amount={Math.abs(personData.IOwe)} /></p>
                                    </div>
                                </div>
                            </div>

                            {/* Cuenta */}
                            <div>
                                <label className="text-[10px] text-slate-400 font-black uppercase tracking-widest ml-1 mb-2 block">
                                    {isDebt ? '¿De qué cuenta sale?' : '¿A qué cuenta ingresa?'}.
                                </label>
                                <div className="relative">
                                    <select
                                        value={accountId}
                                        onChange={e => setAccountId(e.target.value)}
                                        className="w-full bg-slate-800/50 text-white rounded-2xl px-5 py-4 border border-slate-700 font-bold outline-none text-sm appearance-none focus:border-emerald-500 transition-colors"
                                    >
                                        {db.cuentas.map(c => <option key={c.id_cuenta} value={c.id_cuenta}>{c.nombre}</option>)}
                                    </select>
                                    <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500">
                                        <i className="fa-solid fa-chevron-down"></i>
                                    </div>
                                </div>
                            </div>

                            {/* Monto */}
                            <div>
                                <div className="flex justify-between items-center ml-1 mb-2">
                                    <label className="text-[10px] text-slate-400 font-black uppercase tracking-widest">Monto a Liquidar</label>
                                    <button
                                        onClick={() => setAmount(String(personData.totalPending.toFixed(2)))}
                                        className={`text-[10px] text-${accentColor}-400 font-black uppercase tracking-widest hover:text-${accentColor}-300 transition-colors`}
                                    >Liquidar Todo</button>
                                </div>
                                <div className="bg-slate-800/50 rounded-[40px] p-6 border border-slate-700 shadow-inner">
                                    <div className="flex items-center justify-center gap-3">
                                        <span className="text-4xl font-black text-slate-600">$</span>
                                        <input
                                            type="number"
                                            inputMode="decimal"
                                            value={amount}
                                            onChange={e => setAmount(e.target.value)}
                                            className="bg-transparent text-5xl font-black text-white outline-none w-full text-center placeholder:text-slate-800"
                                            placeholder="0.00"
                                        />
                                    </div>
                                </div>
                            </div>

                            {/* Botones */}
                            <div className="flex gap-3">
                                <button
                                    onClick={() => {
                                        if (!amount || parseFloat(amount) <= 0) return;
                                        onConfirm(personData, parseFloat(amount), accountId, isDebt);
                                        onClose();
                                    }}
                                    disabled={!amount || parseFloat(amount) <= 0}
                                    className={`flex-[2] py-6 rounded-[28px] font-black uppercase tracking-widest text-sm shadow-xl transition-all active:scale-95 ${(!amount || parseFloat(amount) <= 0) ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : (isDebt ? 'bg-rose-600 text-white shadow-rose-900/40' : 'bg-emerald-600 text-white shadow-emerald-900/40')}`}
                                >
                                    <i className="fa-solid fa-circle-check mr-2"></i>
                                    {isDebt ? 'Pagar' : 'Cobrar Todo'}
                                </button>

                                <button
                                    onClick={() => {
                                        onOmit(personData.id);
                                        onClose();
                                    }}
                                    className="flex-1 py-6 rounded-[28px] font-black uppercase tracking-widest text-[10px] transition-all active:scale-95 border bg-slate-800 border-slate-700 text-slate-400 hover:text-white hover:bg-slate-700"
                                >
                                    Olvidar Deuda
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AccountActionModal = ({ isOpen, onClose, account, onViewHistory, onCreateTransaction, onAdjust }) => {

            if (!isOpen || !account) return null;
            return (
                <div className="fixed inset-0 z-[150] flex items-end justify-center sm:items-center">
                    <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="bg-slate-900 w-full max-w-sm rounded-t-[32px] sm:rounded-[32px] p-6 pb-8 relative z-10 animate-enter border-t border-slate-700 shadow-2xl flex flex-col items-center">
                        <div className="w-12 h-1.5 bg-slate-800 rounded-full mb-6 sm:hidden"></div>
                        <h2 className="text-xl font-black text-white mb-1">{account.nombre}</h2>
                        <p className="text-xs text-slate-500 font-bold uppercase tracking-widest mb-8">¿Qué deseas hacer?</p>

                        <div className="grid grid-cols-1 gap-4 w-full">
                            <button
                                onClick={() => { onCreateTransaction(account.id_cuenta); onClose(); }}

                            <button
                                onClick={() => { onViewHistory(account.id_cuenta); onClose(); }}

                            >
                                <i className="fa-solid fa-history text-xl"></i>
                                <span className="font-black uppercase tracking-widest text-sm">Ver Historial</span>
                            </button>

                            <button
                                onClick={() => { onAdjust(account); onClose(); }}
                                className="w-full py-5 bg-emerald-600/10 hover:bg-emerald-600/20 text-emerald-400 rounded-2xl flex items-center justify-center gap-3 transition-all active:scale-95 border border-emerald-500/20"

                    </div>

        };
        const AccountAdjustModal = ({ isOpen, onClose, accounts, summary, onApply, initialAccount = null }) => {
            const [step, setStep] = useState(0); // 0: Intro, 1 to N: Accounts, N+1: Summary
            const [inputs, setInputs] = useState({});

            const activeAccounts = useMemo(() => {
                if (initialAccount) return [initialAccount];
                return accounts ? accounts.filter(a => a.id_cuenta !== 'merged') : [];
            }, [accounts, initialAccount]);

            useEffect(() => {
                if (isOpen) {
                    setStep(initialAccount ? 1 : 0);
                    setInputs({});
                }
            }, [isOpen, initialAccount]);

            const totalSteps = activeAccounts.length + 2;

            const handleNext = () => setStep(prev => Math.min(prev + 1, totalSteps - 1));
            const handleBack = () => setStep(prev => Math.max(prev - 1, 0));

            const currentAccount = step > 0 && step <= activeAccounts.length ? activeAccounts[step - 1] : null;

            const registeredBalance = currentAccount ? (summary.cuentas[currentAccount.nombre] || 0) : 0;
            const currentRealValue = (currentAccount && inputs[currentAccount.id_cuenta] !== undefined) ? inputs[currentAccount.id_cuenta] : registeredBalance;
            const diff = currentRealValue - registeredBalance;

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[120] flex items-end justify-center bg-slate-950/90 backdrop-blur-md animate-fade-in px-4">
                    <div className="bg-slate-900 w-full max-w-xl rounded-t-[40px] border-t border-slate-800 shadow-2xl animate-slide-up p-8 mb-safe pb-10">
                        {/* Header */}
                        <div className="flex justify-between items-start mb-6">

                                <h3 className="text-2xl font-black text-white uppercase tracking-tight leading-tight">Ajuste de Cuentas</h3>

                            </div>
                            <button onClick={onClose} className="w-10 h-10 rounded-full bg-slate-800 text-slate-400 flex items-center justify-center shrink-0"><i className="fa-solid fa-xmark"></i></button>
                        </div>

                        {/* Progress Bar */}
                        {step > 0 && (
                            <div className="w-full h-1.5 bg-slate-800 rounded-full mb-8 overflow-hidden relative">
                                <div
                                    className="absolute inset-y-0 left-0 bg-blue-500 progress-fill rounded-full"

                            </div>

                        <div className="min-h-[280px] flex flex-col justify-center">
                            {step === 0 && (
                                <div className="text-center space-y-6 animate-enter">
                                    <div className="w-24 h-24 bg-blue-500/10 text-blue-500 rounded-3xl flex items-center justify-center text-5xl mx-auto mb-4">
                                        <i className="fa-solid fa-magnifying-glass-dollar"></i>
                                    </div>
                                    <p className="text-slate-400 text-sm leading-relaxed max-w-sm mx-auto font-medium">
                                        Vamos a verificar tus saldos reales contra los registros de Flux. Si hay diferencias, se crearán ajustes automáticos por validar.
                                    </p>
                                    <button onClick={handleNext} className="w-full py-5 rounded-[24px] bg-blue-600 text-white font-black uppercase tracking-widest text-sm shadow-xl shadow-blue-900/40 active:scale-95 transition-all">
                                        Comenzar Ajuste
                                    </button>
                                </div>
                            )}

                            {currentAccount && (
                                <div className="space-y-8 animate-enter" key={currentAccount.id_cuenta}>
                                    <div className="text-center">
                                        <h4 className="text-3xl font-black text-white mb-1">{currentAccount.nombre}</h4>
                                        <div className="inline-flex items-center px-3 py-1 bg-slate-800 rounded-full text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                            {currentAccount.id_metodo_pago === 'MP-TDC' ? 'Deuda Actual' : 'Saldo Registrado'}
                                        </div>
                                    </div>

                                    <div className="bg-slate-800/50 rounded-[40px] p-8 border border-slate-700 shadow-inner">
                                        <label className="text-[10px] text-slate-500 font-black uppercase tracking-widest block text-center mb-4">
                                            {currentAccount.id_metodo_pago === 'MP-TDC' ? 'Indica el monto de tu DEUDA actual' : '¿Cuánto tienes realmente?'}
                                        </label>
                                        <div className="flex items-center justify-center gap-3">
                                            {currentAccount.id_metodo_pago === 'MP-TDC' && <span className="text-4xl font-black text-rose-500">-</span>}
                                            <span className="text-4xl font-black text-slate-600">$</span>
                                            <input
                                                type="number"
                                                inputMode="decimal"
                                                value={(currentAccount.id_metodo_pago === 'MP-TDC' && inputs[currentAccount.id_cuenta] !== undefined) ? Math.abs(inputs[currentAccount.id_cuenta]) : (inputs[currentAccount.id_cuenta] ?? "")}
                                                onChange={e => {
                                                    const val = parseFloat(e.target.value);
                                                    const finalVal = (currentAccount.id_metodo_pago === 'MP-TDC' && !isNaN(val)) ? -Math.abs(val) : val;
                                                    setInputs({ ...inputs, [currentAccount.id_cuenta]: isNaN(finalVal) ? undefined : finalVal });

                                                {diff > 0 ? '+' : ''}<Price amount={diff} />

                                    </div>

                                    <div className="flex gap-4">
                                        <button onClick={handleBack} className="flex-1 py-5 rounded-[24px] bg-slate-800 text-slate-400 font-black uppercase tracking-widest text-xs active:scale-95 transition-all">Atrás</button>
                                        {!initialAccount && (
                                            <button
                                                onClick={() => {
                                                    const nextInputs = { ...inputs };
                                                    delete nextInputs[currentAccount.id_cuenta];
                                                    setInputs(nextInputs);
                                                    handleNext();
                                                }}
                                                className="flex-1 py-5 rounded-[24px] bg-slate-800 text-slate-500 font-black uppercase tracking-widest text-xs active:scale-95 transition-all border border-slate-700/50"

                                        <button onClick={handleNext} className="flex-[2] py-5 rounded-[24px] bg-blue-600 text-white font-black uppercase tracking-widest text-xs shadow-xl shadow-blue-900/40 active:scale-95 transition-all">Siguiente</button>

                            )}

                            {step === totalSteps - 1 && (
                                <div className="space-y-6 animate-enter">
                                    <div className="text-center mb-4">
